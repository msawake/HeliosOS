company:
  name: "LeadForge AI"
  domain: "leadforge.ai"
  mission: "AI-powered B2B lead generation agency."

budgets:
  daily_token_budget: 1_000_000
  per_session_cost_limit_usd: 5.00

agent_defaults:
  max_retries: 3

rate_limits:
  max_tool_calls_per_session: 50
  max_api_calls_per_minute: 30

models:
  orchestrator_default: "gemini-2.0-flash"
  doer_default: "gemini-2.0-flash"

# mcp_servers intentionally empty — credentialed MCPs (Atlassian, GitHub, …)
# are registered per-user (or per-namespace / per-tenant) via the dashboard
# `/mcp` page or `POST /api/{platform|users|namespaces}/...` at runtime, not
# hardcoded here. Boot-time `secret:` refs to unset credentials just create
# 0-tool servers that shadow legitimate user-scope MCPs of the same name.
mcp_servers: {}
