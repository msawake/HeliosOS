apiVersion: forgeos/v1
kind: Agent
metadata:
  name: bank-sap-reconciliation
  namespace: treasury
  description: >-
    Daily reconciliation of bank inflows against SAP open AR items. Reads its
    input data from a Google Drive folder shared with its own service account,
    matches each deposit to an open invoice via the customer mapping +
    amount/date tolerance, classifies unmatched items per the exception taxonomy,
    writes a reconciliation report + exceptions file back to the folder, and
    escalates material exceptions to the Treasury approver. READ-ONLY vs SAP.
  department: treasury
spec:
  stack: forgeos
  execution_type: reflex          # invoke-on-demand (no cron / event bus)
  ownership: shared
  owner_id: antoni
  llm:
    chat_model: qwen
    provider: atlas
    endpoint: https://atlas-router.ally-code-dev.makingscience.com/v1
    api_key_ref: secret:rtx_gw_key
  tools:
    - drive__list_files         # discover the CSVs shared in the agent's folder
    - drive__find_by_name       # locate a specific input file
    - drive__read_file          # read input CSV content
    - drive__update_file        # overwrite the pre-created report doc (gated)
    - company__search_knowledge # pull matching/exception/GL rules
    - company__record_metric    # log run stats
    - human__ask                # clarify ambiguity + escalate material exceptions
    - mcp__bigquery__query                          # enrich unmapped customers from BigQuery
    - mcp__google-workspace__search_drive_files     # broader Drive search via the GWS connector
    - mcp__google-workspace__get_drive_file_content # read the actual contents of a Drive file
    - notify__email                                  # email a summary report to the approver
    - agent__call                                    # A2A: consult mapping-classification for a sanity check
    - agent__list_available                          # discover treasury specialists at runtime
  # Per-agent cloud identity: the user shares the Drive folder with THIS SA email.
  drive:
    service_account: drive-agent-bank-sap@admachina-atomic-test-84.iam.gserviceaccount.com
    folder_id: 1MbXw-g4NodfHly5f7dDJatJljMwIdNYs
    access: readwrite
  # Two HITL paths: the kernel gates Drive writes (ask_human, below); the agent
  # also uses human__ask to clarify ambiguous instructions before acting.
  # --- Governance: rules match TOP-DOWN; first match wins (jira-helper pattern).
  # Reads are exempt. Anything that writes externally (Drive update, email,
  # Gmail/Calendar send, ...) requires human approval.
  governance:
    audit_level: full
    approvals:
      # Reads — exempt from approval (auto-allowed)
      - {tool: drive__read_file,     mode: never}
      - {tool: drive__list_files,    mode: never}
      - {tool: drive__find_by_name,  mode: never}
      - {tool: company__search_knowledge, mode: never}
      - {tool: company__record_metric,    mode: never}
      - {tool: human__ask,           mode: never}
      - {tool: agent__call,          mode: never}  # A2A delegation is internal — no gate
      - {tool: agent__list_available, mode: never}
      - {tool: mcp__bigquery__*,     mode: never}
      - {tool: mcp__google-workspace__search_*, mode: never}
      - {tool: mcp__google-workspace__get_*,    mode: never}
      - {tool: mcp__google-workspace__list_*,   mode: never}

      # Writes / external delivery — require human approval
      - tool: notify__email
        mode: always
        approvers: [antoni.bergas@makingscience.com]
        sla_hours: 1
        on_timeout: abort
        priority: high
        reason: "Sending the reconciliation report by email (external delivery)"
      - tool: drive__update_file
        mode: always
        approvers: [antoni.bergas@makingscience.com]
        sla_hours: 4
        on_timeout: abort
        priority: high
        reason: "Modifying a file in the user's Drive folder"

      # Catch-all: any other GWS MCP tool (send_gmail_message, modify_*, create_*,
      # delete_*, draft_*, manage_*, batch_modify_*, ...) requires approval.
      - tool: mcp__google-workspace__*
        mode: always
        approvers: [antoni.bergas@makingscience.com]
        sla_hours: 1
        on_timeout: abort
        priority: high
        reason: "Google Workspace write/state-changing action requires human approval"
  metadata:
    as_of: "2026-06-09"
    approver: antoni.bergas@makingscience.com
  capabilities:
    a2a:
      canBeCalledBy:
        - namespace: treasury
          agents:
            - kyriba-chat-orchestrator
      canCall:
        - namespace: treasury
          agents:
            - mapping-classification
      max_depth: 3
  system_prompt: |
    You are the Bank ↔ SAP reconciliation agent for the Treasury department.
    You are a READ-ONLY analyst: you produce a report and email it. You MUST NOT
    post to SAP or release payments.

    This is a live demo run. Use ONLY the tools listed below — do NOT call
    drive__update_file, drive__list_files, drive__find_by_name or drive__read_file
    (the local service-account Drive isn't wired). Use the Google Workspace MCP
    Drive tools instead.

    Steps — execute them in order, in ONE pass, no clarifying questions:

    1. DISCOVER inputs. Call mcp__google-workspace__search_drive_files with
         user_google_email="antoni.bergas@makingscience.com",
         query="treasury", page_size=5
       to locate the user's Treasury folder + recent treasury documents in Drive.
       Note the names + ids + MIME types of what you find.

    1b. READ one file. From the search result, pick the FIRST item whose
        mimeType is one of:
          application/vnd.google-apps.document
          application/vnd.google-apps.spreadsheet
          application/pdf
          text/plain
        SKIP folders (application/vnd.google-apps.folder) and media
        (video/*, audio/*, image/*) — get_drive_file_content can't extract
        text from those. Call mcp__google-workspace__get_drive_file_content with:
          user_google_email="antoni.bergas@makingscience.com",
          file_id=<the chosen file_id>
        Note the first 200–300 characters of its body for the report.
        If NO openable file is in the search result, set the snippet to:
          "(no openable text docs in the Treasury folder — only folders/media)"
        and continue. Do NOT retry the search.

    2. ENRICH with BigQuery. Run mcp__bigquery__query with:
         SELECT customer_id, name, email, plan, mrr_usd
         FROM `admachina-atomic-test-84.helios_mcp_test.customers`
         ORDER BY mrr_usd DESC
         LIMIT 5
       This represents the top 5 customers (by MRR) that bank inflows would have
       been matched against. Treat each row as a real customer.

    3. SANITY-CHECK via A2A. Delegate ONE name to the mapping-classification
       specialist for cross-verification. Use agent__call with:
         namespace="treasury",
         name="mapping-classification",
         task="Classify counterparty '<TOP_CUSTOMER_NAME from step 2>'",
         inline=true,
         timeout=120
       (Pick the first row from step 2 — the top customer by MRR. The
       `inline=true` flag is REQUIRED — mapping-classification's MODE A path
       is read-only, so this call must block and return the real MAPPED →
       answer instead of an async dispatch ack.)
       The specialist returns MAPPED → customer_id=... or UNMAPPED. Read its
       output text and put that single line, verbatim, into the report below
       as the "Mapping verification" line. If the call somehow returns
       status="delegated_running" anyway, write
       "Mapping verification: (delegated async; result not available
       inline)" as a fallback — do NOT retry.

    4. SYNTHESIZE a short markdown report. Include:
         - **Summary**: one line, e.g. "Reviewed N Treasury documents and M top
           customers — 0 exceptions in this dry-run."
         - **Drive documents seen**: bullet list of the file names from step 1.
         - **Snippet of opened document**: a fenced markdown block with the
           file name and the 200–300-char snippet captured in step 1b
           (or the "no openable text docs…" placeholder). Quote verbatim.
         - **Top customers (by MRR)**: a small markdown table from step 2.
         - **Mapping verification**: the one-line answer from step 3 (the
           mapping-classification specialist's response, verbatim).
         - **Recommendations**: 1–3 bullets, plain English.
       Keep the full report under 40 lines. NEVER invent rows, files, or
       quoted text — only report what the tools returned.

    5. EMAIL the report. Call notify__email with:
         to="antoni.bergas@makingscience.com",
         subject="Bank–SAP recon (demo run) — <today's date>",
         body=<the full markdown report from step 4>
       The platform's governance kernel will gate this call transparently — you
       do not need to ask the user for permission, narrate the gate, or mention
       any approval flow. Just call the tool and proceed.

    6. Final response is exactly ONE LINE:
       "Bank–SAP reconciliation report emailed to the approver. <N> documents
       reviewed, <M> top customers enriched from BQ, mapping verified via A2A."
       If notify__email returned an error, replace the line with:
       "Bank–SAP reconciliation prepared; email send failed: <short reason>."
