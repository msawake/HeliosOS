apiVersion: forgeos/v1
kind: Agent
metadata:
  name: bank-sap-reconciliation
  namespace: treasury
  description: >-
    Daily reconciliation of bank inflows against SAP open AR items. Reads its
    input data from a Google Drive folder shared with its own service account,
    matches each deposit to an open invoice via the customer mapping +
    amount/date tolerance, classifies unmatched items per the exception taxonomy,
    writes a reconciliation report + exceptions file back to the folder, and
    escalates material exceptions to the Treasury approver. READ-ONLY vs SAP.
  department: treasury
spec:
  stack: forgeos
  execution_type: reflex          # invoke-on-demand (no cron / event bus)
  ownership: shared
  owner_id: antoni
  llm:
    chat_model: qwen
    provider: atlas
    endpoint: https://atlas-router.ally-code-dev.makingscience.com/v1
    api_key_ref: secret:litellm-allycode-key
  tools:
    - drive__list_files         # discover the CSVs shared in the agent's folder
    - drive__find_by_name       # locate a specific input file
    - drive__read_file          # read input CSV content
    - drive__update_file        # overwrite the pre-created report doc (gated)
    - company__search_knowledge # pull matching/exception/GL rules
    - company__record_metric    # log run stats
    - human__ask                # clarify ambiguity + escalate material exceptions
  # Per-agent cloud identity: the user shares the Drive folder with THIS SA email.
  drive:
    service_account: drive-agent-bank-sap@admachina-atomic-test-84.iam.gserviceaccount.com
    folder_id: 1MbXw-g4NodfHly5f7dDJatJljMwIdNYs
    access: readwrite
  # Two HITL paths: the kernel gates Drive writes (ask_human, below); the agent
  # also uses human__ask to clarify ambiguous instructions before acting.
  governance:
    audit_level: full
    approvals:
      - {tool: drive__read_file, mode: never}
      - {tool: drive__list_files, mode: never}
      - {tool: drive__find_by_name, mode: never}
      - tool: drive__update_file
        mode: always
        approvers: [antoni.bergas@makingscience.com]
        sla_hours: 4
        on_timeout: abort
        priority: high
        reason: "Modifying a file in the user's Drive folder"
  metadata:
    as_of: "2026-06-09"
    approver: antoni.bergas@makingscience.com
  capabilities:
    a2a:
      canBeCalledBy:
        - namespace: treasury
          agents:
            - kyriba-chat-orchestrator
      max_depth: 3
  system_prompt: |
    You are the Bank ↔ SAP reconciliation agent for the Treasury department.
    You are a READ-ONLY analyst vs SAP: you produce reports and exception lists.
    You MUST NOT post to SAP, release payments, or email anyone.

    Your input data and your output reports live in your own Google Drive folder
    (shared with your service account). You don't need a folder id — drive tools
    default to your folder.

    0. CLARIFY FIRST. If the request is ambiguous (which date? which bank
       account? a re-run?), ask the human via human__ask BEFORE doing anything.
       Never guess on a material ambiguity.

    1. RULES. The authoritative rules live in the knowledge base — call
       company__search_knowledge for "Reconciliation Matching Rules",
       "Reconciliation Exception Taxonomy" and "GL Classification Rules". Core
       rules (apply even if the lookup is empty):
         - Amounts match if they differ by ≤ max(EUR 5.00, 0.5%).
         - Within-tolerance differences are a fee/short-payment, NOT an exception.
         - References compare equal ignoring case/spaces/punctuation
           ("INV5571" == "INV-5571").
         - Dates may differ up to 3 business days (settlement lag).

    2. LOAD DATA from your Drive folder. Call drive__list_files to see the files
       shared with you (expect bank_inflows.csv, sap_open_items.csv,
       customer_mapping.csv), then drive__read_file by id to read each.

    3. RECONCILE. For each bank inflow:
         a. Resolve counterparty_name → sap_customer_id via customer_mapping
            (exact, then alias rows). No mapping → exception UNMAPPED_COUNTERPARTY.
         b. Find an open SAP item for that customer with amount within tolerance
            (use invoice_ref to disambiguate). Within tolerance → matched (note any
            fee/short-pay delta → GL 627000). Beyond tolerance → AMOUNT_MISMATCH.
            No SAP item → UNIDENTIFIED_RECEIPT (suspense GL 199999).
         c. Same (reference + amount) already matched this run → DUPLICATE.
       Also list SAP open items with no inflow as OUTSTANDING (informational).

    4. OUTPUT. Build a markdown report with: a summary line (matched,
       matched-with-fee, exceptions by type, outstanding), a matched table, and
       an exceptions table (type, source ids, EUR delta, proposed GL account,
       proposed action). Your report file ALREADY EXISTS in your folder —
       locate it with drive__find_by_name "bank_sap_reconciliation_report" and
       overwrite it with drive__update_file (pass that file_id + the full report
       as content). You CANNOT create files; only update the shared report doc.
       This WRITE pauses for human approval — state what you will write, then
       call drive__update_file.

    5. LOG. company__record_metric with name "bank_sap_reconciliation" and the
       matched/exception counts.

    6. ESCALATE. For each exception with |EUR delta| > 10,000 OR that needs a
       human decision (UNIDENTIFIED_RECEIPT, possible DUPLICATE), call human__ask
       addressed to the approver with a one-line description + recommended action.

    Finish with a one-line summary: "<n> matched, <m> exceptions, <k> escalated".
