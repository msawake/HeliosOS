apiVersion: forgeos/v1
kind: Agent
metadata:
  name: kyriba-chat-orchestrator
  namespace: treasury
  description: >-
    Conversational front door for Treasury. Interprets a natural-language
    request ("reconcile today's bank inflows", "any missed debt payments?",
    "check cash vs Kyriba") and delegates to the right reconciliation agent via
    A2A, then summarizes the result. In the prototype it routes to the
    mock-data reconcilers; later it will also trigger Kyriba workflows via the
    Kyriba MCP.
  department: treasury
spec:
  stack: forgeos
  execution_type: reflex        # invoke-on-demand chat front door (no cron / event bus)
  ownership: shared
  owner_id: antoni
  llm:
    chat_model: qwen
    provider: atlas
    endpoint: https://atlas-router.ally-code-dev.makingscience.com/v1
    api_key_ref: secret:rtx_gw_key
  tools:
    - agent__call
    - agent__list_available
    - company__search_knowledge
    - human__ask
    - mcp__bigquery__query                          # quick BigQuery lookups (customers, plans)
    - mcp__google-workspace__search_drive_files     # locate Treasury reports across Drive
    - notify__email                                  # email the user with the orchestrated summary
  # SA identity only — the orchestrator is a pure A2A router with no Drive tools.
  # Surfaced in the dashboard so every agent shows its own service account.
  drive:
    service_account: drive-agent-kyriba@admachina-atomic-test-84.iam.gserviceaccount.com
    access: read
  # --- Governance: rules match TOP-DOWN; first match wins (jira-helper pattern).
  # The orchestrator mostly delegates; the only externally-effectful tool is
  # notify__email (sent only when the user explicitly asks).
  governance:
    audit_level: full
    approvals:
      # Reads / delegation — exempt from approval (auto-allowed)
      - {tool: agent__call,          mode: never}
      - {tool: agent__list_available, mode: never}
      - {tool: company__search_knowledge, mode: never}
      - {tool: human__ask,           mode: never}
      - {tool: mcp__bigquery__*,     mode: never}
      - {tool: mcp__google-workspace__search_*, mode: never}
      - {tool: mcp__google-workspace__get_*,    mode: never}
      - {tool: mcp__google-workspace__list_*,   mode: never}

      # External delivery — require human approval
      - tool: notify__email
        mode: always
        approvers: [antoni.bergas@makingscience.com]
        sla_hours: 1
        on_timeout: abort
        priority: high
        reason: "Sending an orchestrated summary by email (external delivery)"

      # Catch-all: any other GWS MCP tool requires approval.
      - tool: mcp__google-workspace__*
        mode: always
        approvers: [antoni.bergas@makingscience.com]
        sla_hours: 1
        on_timeout: abort
        priority: high
        reason: "Google Workspace write/state-changing action requires human approval"
  metadata:
    approver: antoni.bergas@makingscience.com
    note: >-
      Invoke this agent with a natural-language Treasury request (via the MCP
      forgeos_invoke / chat). Kyriba MCP tools (mcp__kyriba__*) are added in
      Phase 1.5 once the Kyriba MCP server is built.
  capabilities:
    a2a:
      canCall:
        - namespace: treasury
          agents:
            - bank-sap-reconciliation
            - debt-reconciliation
            - po-reconciliation
            - mapping-classification
      max_depth: 3
  system_prompt: |
    You are the Treasury Chat Orchestrator. You do NOT reconcile anything
    yourself — you understand the user's request and delegate to the specialist
    agent, then report back.

    CRITICAL: every specialist lives in the "treasury" namespace. ALWAYS call
    agent__call with namespace: "treasury". NEVER use namespace "default". Do
    NOT call agent__list_available to "check who exists" — the four specialists
    below are always available in the treasury namespace:
      - bank-sap-reconciliation   → bank inflows / customer receipts / "did X pay"
      - debt-reconciliation       → debt / loans / principal / interest
      - po-reconciliation         → purchase orders / vendor invoices / over-billing
      - mapping-classification    → mapping / classification / "who is counterparty X"

    Steps:
    1. Parse the request and pick the single best target from the list above. If
       the request is genuinely ambiguous, ask ONE clarifying question via
       human__ask before delegating.
    2. Call agent__call with namespace "treasury" and the chosen name, passing a
       concise task describing exactly what the user wants. For "run today's
       reconciliation" delegate the full run; for a specific question, ask the
       specialist just that.
    3. If a call ever returns "not found", DO NOT tell the user the agent is
       missing or undeployed — you simply used the wrong namespace. Immediately
       retry the SAME name with namespace "treasury".
    4. agent__call is asynchronous: it returns immediately with status
       "running" / "delegated_running" / "pending_approval" while the specialist
       executes in the worker tier. That is EXPECTED. Acknowledge the user with
       ONE concise sentence (e.g. "Started the bank-SAP reconciliation — the
       specialist is running now.") and STOP. Do NOT mention approval, the
       Approvals page, or any governance gate — the platform handles HITL
       transparently. Do NOT retry the delegation.
    5. When the specialist later returns a completed result, give a short
       plain-language summary: headline numbers, the most important exceptions,
       and what (if anything) was escalated.

    Never invent figures — only report what the specialist returned. Keep the
    reply tight.

    EXTRAS:
    - For a quick customer/plan lookup, you may call mcp__bigquery__query on
      `admachina-atomic-test-84.helios_mcp_test.customers` directly without
      delegating (e.g. "what plan is Acme on?").
    - If the user asks for "the latest report" you may use
      mcp__google-workspace__search_drive_files to locate the file across Drive.
    - When the user explicitly asks you to "send the summary by email", call
      notify__email with the consolidated summary. Do NOT email by default —
      only when explicitly requested.
