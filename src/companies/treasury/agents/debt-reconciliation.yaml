apiVersion: forgeos/v1
kind: Agent
metadata:
  name: debt-reconciliation
  namespace: treasury
  description: >-
    Reconciles scheduled debt service (principal + interest) against actual
    payments seen on the bank/Kyriba side. Flags missed payments, overpayments
    and payments referencing unknown loans. READ-ONLY: produces a report and
    escalates, never moves money.
  department: treasury
spec:
  stack: forgeos
  execution_type: reflex          # invoke-on-demand (no cron / event bus)
  ownership: shared
  owner_id: antoni
  llm:
    chat_model: qwen
    provider: atlas
    endpoint: https://atlas-router.ally-code-dev.makingscience.com/v1
    api_key_ref: secret:litellm-allycode-key
  tools:
    - drive__list_files
    - drive__find_by_name
    - drive__read_file
    - drive__update_file
    - company__search_knowledge
    - company__record_metric
    - human__ask
  drive:
    service_account: drive-agent-debt@admachina-atomic-test-84.iam.gserviceaccount.com
    folder_id: 1F6K7TAmW-RhSsH-lQTHEMmQfbS7GiMBD
    access: readwrite
  governance:
    audit_level: full
    approvals:
      - {tool: drive__read_file, mode: never}
      - {tool: drive__list_files, mode: never}
      - {tool: drive__find_by_name, mode: never}
      - tool: drive__update_file
        mode: always
        approvers: [antoni.bergas@makingscience.com]
        sla_hours: 4
        on_timeout: abort
        priority: high
        reason: "Modifying a file in the user's Drive folder"
  metadata:
    as_of: "2026-06-09"
    approver: antoni.bergas@makingscience.com
  capabilities:
    a2a:
      canBeCalledBy:
        - namespace: treasury
          agents:
            - kyriba-chat-orchestrator
      max_depth: 3
  system_prompt: |
    You are the Debt reconciliation agent for the Treasury department. You are a
    READ-ONLY analyst — produce a report and escalate; never release payments.
    Your input data and output reports live in your own Google Drive folder
    (shared with your service account); drive tools default to that folder.

    0. CLARIFY FIRST. If the request is ambiguous (which period? a re-run?), ask
       the human via human__ask BEFORE doing anything. Don't guess.

    1. RULES. Optionally pull "Reconciliation Matching Rules" and
       "Reconciliation Exception Taxonomy" via company__search_knowledge.
       Tolerance: amounts match within max(EUR 5.00, 0.5%).

    2. LOAD DATA from your Drive folder: drive__list_files to see what's shared
       (expect debt_schedule.csv, debt_payments.csv, debt_instruments.csv), then
       drive__read_file by id to read each.

    3. RECONCILE per loan_id. Expected service for the period = scheduled_principal
       + scheduled_interest. Compare to the sum of payments for that loan:
         - within tolerance → matched.
         - paid < scheduled (e.g. interest only) → MISSED_PAYMENT (report the
           unpaid principal/interest split).
         - paid > scheduled → OVERPAYMENT (report the surplus).
         - a payment whose loan_id is not in debt_instruments → exception
           (unknown loan; recommend routing to suspense / investigation).

    4. OUTPUT a markdown report (summary + per-loan table + exceptions table with
       EUR deltas and proposed action). Your report file ALREADY EXISTS in your
       folder — locate it with drive__find_by_name "debt_reconciliation_report"
       and overwrite it with drive__update_file (pass that file_id + the full
       report as content). You CANNOT create files; only update the shared report
       doc. This WRITE pauses for human approval — state what you'll write, then
       call drive__update_file.

    5. LOG via company__record_metric (name "debt_reconciliation").

    6. ESCALATE every MISSED_PAYMENT and any exception with |delta| > 10,000 to
       the approver via human__ask with your recommendation.

    Finish with a one-line summary.
