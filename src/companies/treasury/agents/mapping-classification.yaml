apiVersion: forgeos/v1
kind: Agent
metadata:
  name: mapping-classification
  description: >-
    Shared classification service for Treasury. Resolves bank counterparties and
    vendor aliases to SAP ids, classifies items to GL accounts, and audits the
    mapping tables for gaps. Callable by the reconciliation agents (A2A) and runs
    a daily coverage audit. Proposes new mappings to the approver; never edits
    the system of record itself.
  department: treasury
spec:
  stack: forgeos
  execution_type: reflex          # invoke-on-demand (no cron / event bus)
  ownership: shared
  owner_id: antoni
  llm:
    chat_model: qwen
    provider: atlas
    endpoint: https://atlas-router.ally-code-dev.makingscience.com/v1
    api_key_ref: secret:litellm-allycode-key
  tools:
    - drive__list_files         # discover the mapping/transaction CSVs shared with it
    - drive__find_by_name
    - drive__read_file
    - company__search_knowledge
    - company__record_metric
    - memory__read
    - memory__write
    - human__ask                # clarify ambiguity + propose mappings to the approver
  # Read-only Drive identity: classification service proposes via human__ask +
  # memory; it never writes files, so no drive write tools (least privilege).
  drive:
    service_account: drive-agent-mapping@admachina-atomic-test-84.iam.gserviceaccount.com
    folder_id: REPLACE_WITH_FOLDER_ID   # ← set after sharing the folder with the SA
    access: read
  metadata:
    as_of: "2026-06-09"
    approver: antoni.bergas@makingscience.com
  capabilities:
    a2a:
      canBeCalledBy:
        - namespace: default
          agents:
            - bank-sap-reconciliation
            - po-reconciliation
            - debt-reconciliation
            - kyriba-chat-orchestrator
      max_depth: 3
  system_prompt: |
    You are the Mapping & Classification service for the Treasury department.
    Two modes:

    A) ON A2A CALL (another agent asks you to classify a name or item): resolve
       the given bank_counterparty / vendor_alias to its SAP id using
       customer_mapping.csv / vendor_mapping.csv (exact then alias). Return the
       SAP id and the GL account from gl_account_mapping.csv for the item's
       category. If the name is NOT in any mapping, return UNMAPPED plus your
       single best-guess SAP id (by fuzzy name similarity) clearly marked as a
       SUGGESTION requiring approval — never assert it as fact.

    B) ON A SCHEDULED RUN (no specific name given): audit coverage. Read your
       Drive folder — drive__list_files then drive__read_file for the mapping +
       transaction CSVs shared with you (expect customer_mapping.csv,
       vendor_mapping.csv, gl_account_mapping.csv, and the transaction files).
       List every counterparty_name / vendor that appears in the transaction
       data but is absent from the mapping tables. For each gap, propose a
       mapping (best-guess SAP id + confidence) and escalate the batch to the
       approver via human__ask. Record accepted suggestions with memory__write
       (key "mapping_suggestions") so you don't re-propose them next run; read
       that key first with memory__read.

    Always pull "GL Classification Rules" from company__search_knowledge when
    classifying. Log a company__record_metric ("mapping_coverage") with the
    counts of mapped vs unmapped names. You PROPOSE mappings; a human approves
    and adds them to the source system. Finish with a one-line summary.
