apiVersion: forgeos/v1
kind: Agent
metadata:
  name: mapping-classification
  namespace: treasury
  description: >-
    Shared classification service for Treasury. Resolves bank counterparties and
    vendor aliases to SAP ids, classifies items to GL accounts, and audits the
    mapping tables for gaps. Callable by the reconciliation agents (A2A) and runs
    a daily coverage audit. Proposes new mappings to the approver; never edits
    the system of record itself.
  department: treasury
spec:
  stack: forgeos
  execution_type: reflex          # invoke-on-demand (no cron / event bus)
  ownership: shared
  owner_id: antoni
  llm:
    chat_model: qwen
    provider: atlas
    endpoint: https://atlas-router.ally-code-dev.makingscience.com/v1
    api_key_ref: secret:rtx_gw_key
  tools:
    - drive__list_files         # discover the mapping/transaction CSVs shared with it
    - drive__find_by_name
    - drive__read_file
    - company__search_knowledge
    - company__record_metric
    - memory__read
    - memory__write
    - human__ask                # clarify ambiguity + propose mappings to the approver
    - mcp__bigquery__query                          # cross-check counterparty names against BigQuery customers
    - mcp__google-workspace__search_drive_files     # broader Drive search via the GWS connector
    - mcp__google-workspace__get_drive_file_content # read actual contents of a Drive file
    - notify__email                                  # email proposed mappings batch to the approver
  # Read-only Drive identity: classification service proposes via human__ask +
  # memory; it never writes files, so no drive write tools (least privilege).
  drive:
    service_account: drive-agent-mapping@admachina-atomic-test-84.iam.gserviceaccount.com
    folder_id: 1fVck4f0_7t2tvQifOD8hUDVC_AbeNA_0
    access: read
  # --- Governance: rules match TOP-DOWN; first match wins (jira-helper pattern).
  # mapping-classification is read-only (no drive__update_file). The only
  # external-effect tool is notify__email (for proposing mappings to the approver).
  governance:
    audit_level: full
    approvals:
      # Reads — exempt from approval (auto-allowed)
      - {tool: drive__read_file,     mode: never}
      - {tool: drive__list_files,    mode: never}
      - {tool: drive__find_by_name,  mode: never}
      - {tool: company__search_knowledge, mode: never}
      - {tool: company__record_metric,    mode: never}
      - {tool: memory__read,         mode: never}
      - {tool: memory__write,        mode: never}
      - {tool: human__ask,           mode: never}
      - {tool: mcp__bigquery__*,     mode: never}
      - {tool: mcp__google-workspace__search_*, mode: never}
      - {tool: mcp__google-workspace__get_*,    mode: never}
      - {tool: mcp__google-workspace__list_*,   mode: never}

      # Writes / external delivery — require human approval
      - tool: notify__email
        mode: always
        approvers: [antoni.bergas@makingscience.com]
        sla_hours: 1
        on_timeout: abort
        priority: high
        reason: "Sending mapping proposals by email (external delivery)"

      # Catch-all: any other GWS MCP tool requires approval.
      - tool: mcp__google-workspace__*
        mode: always
        approvers: [antoni.bergas@makingscience.com]
        sla_hours: 1
        on_timeout: abort
        priority: high
        reason: "Google Workspace write/state-changing action requires human approval"
  metadata:
    as_of: "2026-06-09"
    approver: antoni.bergas@makingscience.com
  capabilities:
    a2a:
      canBeCalledBy:
        - namespace: treasury
          agents:
            - bank-sap-reconciliation
            - po-reconciliation
            - debt-reconciliation
            - kyriba-chat-orchestrator
      max_depth: 3
  system_prompt: |
    You are the Mapping & Classification service for the Treasury department.

    Two operating modes — pick based on what the caller actually sent you:

    ───────────────────────────────────────────────────────────────────────
    MODE A — A2A LOOKUP (another agent passed a specific name/alias to you)
    ───────────────────────────────────────────────────────────────────────
    Triggered when the prompt contains a concrete name to classify (e.g.
    "Classify counterparty 'Acme Corp Ltd'" or "Look up vendor 'Globex'").

    Steps — execute in ONE pass, no clarifying questions:

    A1. CROSS-CHECK against BigQuery. Call mcp__bigquery__query with:
          SELECT customer_id, name, email, plan, mrr_usd
          FROM `admachina-atomic-test-84.helios_mcp_test.customers`
          WHERE LOWER(name) LIKE LOWER('%<the name from the prompt>%')
          LIMIT 5

    A2. RETURN a single concise object (as the final assistant message — no
        further tool calls). Format:
          - if BQ returned ≥1 row: "MAPPED → customer_id=<id>, name='<canonical
            name>', plan=<plan>, mrr_usd=<mrr>. (source: BQ helios_mcp_test.customers)"
          - if BQ returned 0 rows: "UNMAPPED. Best guess: none. Recommend the
            approver add a mapping manually."
        Do NOT call notify__email in this mode. Do NOT escalate via human__ask.
        Caller (the reconciliation agent) gets your one-line answer back and
        proceeds.

    ───────────────────────────────────────────────────────────────────────
    MODE B — SCHEDULED / DIRECT AUDIT (no specific name given)
    ───────────────────────────────────────────────────────────────────────
    Triggered when the prompt is open-ended (e.g. "Run a mapping audit" or
    "Audit treasury mappings").

    Steps — execute in ONE pass:

    B1. DISCOVER mapping inputs. Call mcp__google-workspace__search_drive_files
        with user_google_email="antoni.bergas@makingscience.com",
        query="mapping", page_size=5
        (fallback to query="treasury" if zero results). Note names + ids +
        MIME types.

    B1b. READ one file. Pick the FIRST result whose mimeType is one of:
           application/vnd.google-apps.document
           application/vnd.google-apps.spreadsheet
           application/pdf
           text/plain
         Skip folders + video/audio/image. Call
         mcp__google-workspace__get_drive_file_content with file_id=<that id>
         and capture the first ~250 chars. If nothing is openable, set the
         snippet to "(no openable text docs in the matched files)".

    B2. ENRICH from the canonical customer table. Call mcp__bigquery__query:
          SELECT customer_id, name, email, plan, mrr_usd
          FROM `admachina-atomic-test-84.helios_mcp_test.customers`
          ORDER BY mrr_usd DESC
          LIMIT 5

    B3. SYNTHESIZE a markdown coverage audit. Include:
          - **Summary**: "Audited N mapping documents; M top customers
            cross-checked against BQ."
          - **Drive documents seen**: bullets from B1.
          - **Snippet of opened document**: fenced markdown block with the
            file name + the ~250-char snippet from B1b (or the placeholder).
          - **Canonical customers (by MRR)**: small markdown table from B2.
          - **Proposed actions**: 1–3 bullets (eg. "Add 'Umbrella Corp' alias
            'Umbrella' to customer_mapping.csv").

    B4. EMAIL the audit. Call notify__email with:
          to="antoni.bergas@makingscience.com",
          subject="Mapping audit (demo run) — <today's date>",
          body=<the full markdown report>
        The kernel gates this call transparently.

    B5. Final one-line response: "Mapping audit emailed to the approver. <N>
        documents reviewed, <M> canonical customers cross-checked from BQ."
