apiVersion: forgeos/v1
kind: Agent
metadata:
  name: po-reconciliation
  namespace: treasury
  description: >-
    Three-way match of purchase orders ↔ vendor invoices ↔ AP payments. Flags
    over-billing, duplicate invoices, maverick (no-PO) spend and open
    commitments. READ-ONLY: produces a report and escalates, never approves
    payment.
  department: treasury
spec:
  stack: forgeos
  execution_type: reflex          # invoke-on-demand (no cron / event bus)
  ownership: shared
  owner_id: antoni
  llm:
    chat_model: qwen
    provider: atlas
    endpoint: https://atlas-router.ally-code-dev.makingscience.com/v1
    api_key_ref: secret:rtx_gw_key
  tools:
    - drive__list_files
    - drive__find_by_name
    - drive__read_file
    - drive__update_file
    - company__search_knowledge
    - company__record_metric
    - human__ask
    - mcp__bigquery__query                          # enrich vendor/customer lookups from BigQuery
    - mcp__google-workspace__search_drive_files     # broader Drive search via the GWS connector
    - notify__email                                  # email a summary report to the approver
  drive:
    service_account: drive-agent-po@admachina-atomic-test-84.iam.gserviceaccount.com
    folder_id: 1FdUNDp0HdAo6EqccQIncWAfKKOecbL2s
    access: readwrite
  # --- Governance: rules match TOP-DOWN; first match wins (jira-helper pattern).
  # Reads are exempt. External delivery / writes require human approval.
  governance:
    audit_level: full
    approvals:
      # Reads — exempt from approval (auto-allowed)
      - {tool: drive__read_file,     mode: never}
      - {tool: drive__list_files,    mode: never}
      - {tool: drive__find_by_name,  mode: never}
      - {tool: company__search_knowledge, mode: never}
      - {tool: company__record_metric,    mode: never}
      - {tool: human__ask,           mode: never}
      - {tool: mcp__bigquery__*,     mode: never}
      - {tool: mcp__google-workspace__search_*, mode: never}
      - {tool: mcp__google-workspace__get_*,    mode: never}
      - {tool: mcp__google-workspace__list_*,   mode: never}

      # Writes / external delivery — require human approval
      - tool: notify__email
        mode: always
        approvers: [antoni.bergas@makingscience.com]
        sla_hours: 1
        on_timeout: abort
        priority: high
        reason: "Sending the PO reconciliation report by email (external delivery)"
      - tool: drive__update_file
        mode: always
        approvers: [antoni.bergas@makingscience.com]
        sla_hours: 4
        on_timeout: abort
        priority: high
        reason: "Modifying a file in the user's Drive folder"

      # Catch-all: any other GWS MCP tool (send_gmail_message, modify_*, create_*,
      # delete_*, draft_*, manage_*, batch_modify_*, ...) requires approval.
      - tool: mcp__google-workspace__*
        mode: always
        approvers: [antoni.bergas@makingscience.com]
        sla_hours: 1
        on_timeout: abort
        priority: high
        reason: "Google Workspace write/state-changing action requires human approval"
  metadata:
    as_of: "2026-06-09"
    approver: antoni.bergas@makingscience.com
  capabilities:
    a2a:
      canBeCalledBy:
        - namespace: treasury
          agents:
            - kyriba-chat-orchestrator
      max_depth: 3
  system_prompt: |
    You are the Purchase-Order reconciliation agent for the Treasury department.
    You are a READ-ONLY analyst — produce a report and escalate; never approve or
    release a vendor payment. Your inputs and your report live in your own Google
    Drive folder (shared with your service account); drive tools default to it.

    0. CLARIFY FIRST. If the request is ambiguous (which period? which vendor?),
       ask the human via human__ask BEFORE doing anything. Don't guess.

    1. RULES. Optionally pull "Reconciliation Exception Taxonomy" and "GL
       Classification Rules" via company__search_knowledge. Tolerance:
       max(EUR 5.00, 0.5%).

    2. LOAD DATA from your Drive folder: drive__list_files then drive__read_file
       for purchase_orders.csv, vendor_invoices.csv, ap_payments.csv.

    3. THREE-WAY MATCH per po_number:
         - invoice amount within tolerance of PO amount, and payment matches the
           invoice → matched (clean).
         - invoice_amount > po_amount beyond tolerance → PO_OVERBILL (report the
           overage).
         - two invoices with the same po_number + amount → DUPLICATE invoice.
         - an invoice with an empty po_number → MAVERICK_SPEND (off-contract).
         - a PO with no invoice → OUTSTANDING commitment (informational).
         - an invoice matched to PO but not yet paid → OPEN payable (informational
           unless also an exception).

    4. OUTPUT a markdown report (summary + matched table + exceptions table:
       type, po/invoice/payment ids, EUR delta, proposed action). Your report file
       ALREADY EXISTS in your folder — locate it with drive__find_by_name
       "po_reconciliation_report" and overwrite it with drive__update_file (pass
       that file_id + the full report as content). You CANNOT create files; only
       update the shared report doc. The governance kernel will gate this call
       transparently — do not narrate the pause, just call the tool.

    5. LOG via company__record_metric (name "po_reconciliation").

    6. ESCALATE every PO_OVERBILL, DUPLICATE and MAVERICK_SPEND, plus anything
       with |delta| > 10,000, to the approver via human__ask with a recommendation.

    7. ENRICH. For a MAVERICK_SPEND or unfamiliar vendor, optionally run a
       BigQuery lookup via mcp__bigquery__query:
         SELECT customer_id, name, email, plan, mrr_usd
         FROM `admachina-atomic-test-84.helios_mcp_test.customers`
         WHERE LOWER(name) LIKE LOWER('%<vendor>%')
       to add context to your escalation. Never invent rows.

    8. NOTIFY. Once the report is written and approved, send a one-paragraph
       summary to the approver via notify__email (subject: "PO recon <as_of>"),
       listing PO_OVERBILL/DUPLICATE/MAVERICK_SPEND counts and the link to the
       report file.

    Finish with a one-line summary.
