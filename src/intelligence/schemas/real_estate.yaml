# HomeForge AI — Real Estate Ontology Schema
# Object types and relationships for real estate transactions.

types:
  - name: Buyer
    description: A person or entity looking to purchase property
    icon: user
    properties:
      name: {type: string, required: true}
      email: {type: string, required: true}
      phone: {type: string}
      budget_min: {type: number}
      budget_max: {type: number}
      preferred_location: {type: string}
      pre_approved: {type: boolean}
      buyer_type: {type: enum, values: [first_time, investor, relocating, upgrading]}

  - name: Seller
    description: A property owner looking to sell
    icon: building
    properties:
      name: {type: string, required: true}
      email: {type: string, required: true}
      phone: {type: string}
      reason_for_sale: {type: enum, values: [relocating, downsizing, upgrading, investment, estate]}
      timeline: {type: enum, values: [immediate, one_month, three_months, flexible]}

  - name: Property
    description: A real estate property (house, condo, land, commercial)
    icon: home
    properties:
      address: {type: string, required: true}
      property_type: {type: enum, values: [single_family, condo, townhouse, multi_family, land, commercial]}
      bedrooms: {type: number}
      bathrooms: {type: number}
      square_feet: {type: number}
      lot_size: {type: number}
      year_built: {type: number}
      city: {type: string}
      state: {type: string}
      zip_code: {type: string}

  - name: Listing
    description: A property listed for sale on the market
    icon: sign
    properties:
      mls_number: {type: string, required: true}
      list_price: {type: number, required: true}
      status: {type: enum, values: [coming_soon, active, pending, sold, withdrawn, expired]}
      listed_date: {type: date}
      days_on_market: {type: number}
      listing_agent: {type: string}
      open_house_date: {type: date}

  - name: Transaction
    description: A completed or in-progress real estate transaction
    icon: file-signature
    properties:
      transaction_id: {type: string, required: true}
      sale_price: {type: number, required: true}
      offer_price: {type: number}
      closing_date: {type: date}
      status: {type: enum, values: [offer, under_contract, inspection, appraisal, closing, closed, fell_through]}
      earnest_money: {type: number}
      commission_pct: {type: number}

  - name: Mortgage
    description: A mortgage or financing arrangement for a property purchase
    icon: bank
    properties:
      lender: {type: string, required: true}
      loan_amount: {type: number, required: true}
      interest_rate: {type: number}
      loan_type: {type: enum, values: [conventional, fha, va, usda, jumbo]}
      term_years: {type: number}
      monthly_payment: {type: number}
      status: {type: enum, values: [pre_approved, applied, underwriting, approved, funded, denied]}

  - name: Inspection
    description: A property inspection report
    icon: search
    properties:
      inspector: {type: string, required: true}
      inspection_date: {type: date}
      result: {type: enum, values: [pass, pass_with_issues, fail]}
      issues_found: {type: number}
      estimated_repair_cost: {type: number}
      report_url: {type: string}

links:
  - name: owns_property
    from: Seller
    to: Property
    cardinality: one_to_many

  - name: property_listing
    from: Property
    to: Listing
    cardinality: one_to_many

  - name: interested_in
    from: Buyer
    to: Listing
    cardinality: many_to_many

  - name: buyer_transaction
    from: Buyer
    to: Transaction
    cardinality: one_to_many

  - name: seller_transaction
    from: Seller
    to: Transaction
    cardinality: one_to_many

  - name: listing_transaction
    from: Listing
    to: Transaction
    cardinality: one_to_one

  - name: transaction_mortgage
    from: Transaction
    to: Mortgage
    cardinality: one_to_one

  - name: transaction_inspection
    from: Transaction
    to: Inspection
    cardinality: one_to_many
