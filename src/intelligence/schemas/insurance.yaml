# InsureForge AI — Insurance Ontology Schema
# Object types and relationships for insurance quoting, policies, and claims.

types:
  - name: Policyholder
    description: An individual or business that holds insurance policies
    icon: user-shield
    properties:
      name: {type: string, required: true}
      email: {type: string, required: true}
      date_of_birth: {type: date}
      address: {type: string}
      risk_score: {type: number}
      customer_since: {type: date}
      segment: {type: enum, values: [individual, small_business, enterprise]}

  - name: Policy
    description: An active or historical insurance policy
    icon: file-shield
    properties:
      policy_number: {type: string, required: true}
      policy_type: {type: enum, values: [auto, home, life, health, commercial, umbrella]}
      premium: {type: number, required: true}
      coverage_amount: {type: number, required: true}
      deductible: {type: number}
      start_date: {type: date}
      end_date: {type: date}
      status: {type: enum, values: [active, lapsed, cancelled, expired]}

  - name: Claim
    description: An insurance claim filed against a policy
    icon: file-medical
    properties:
      claim_number: {type: string, required: true}
      claim_type: {type: string}
      amount_claimed: {type: number, required: true}
      amount_approved: {type: number}
      filed_date: {type: date}
      status: {type: enum, values: [filed, under_review, approved, denied, settled]}
      description: {type: string}

  - name: Quote
    description: An insurance quote or proposal
    icon: calculator
    properties:
      quote_number: {type: string, required: true}
      product_type: {type: enum, values: [auto, home, life, health, commercial, umbrella]}
      premium_monthly: {type: number, required: true}
      coverage_amount: {type: number}
      valid_until: {type: date}
      status: {type: enum, values: [draft, sent, accepted, declined, expired]}

  - name: Agent
    description: An insurance agent or broker
    icon: id-badge
    properties:
      name: {type: string, required: true}
      license_number: {type: string, required: true}
      email: {type: string}
      region: {type: string}
      specialization: {type: enum, values: [personal, commercial, life, health]}
      active_policies: {type: number}

  - name: Underwriting
    description: An underwriting assessment for a policy or quote
    icon: clipboard-list
    properties:
      assessment_id: {type: string, required: true}
      risk_rating: {type: enum, values: [preferred, standard, substandard, declined]}
      risk_factors: {type: string}
      decision: {type: enum, values: [approved, approved_with_conditions, declined, refer]}
      assessed_date: {type: date}
      assessor: {type: string}

links:
  - name: holds_policy
    from: Policyholder
    to: Policy
    cardinality: one_to_many

  - name: policy_claim
    from: Policy
    to: Claim
    cardinality: one_to_many

  - name: requested_quote
    from: Policyholder
    to: Quote
    cardinality: one_to_many

  - name: quote_to_policy
    from: Quote
    to: Policy
    cardinality: one_to_one

  - name: managed_by
    from: Policyholder
    to: Agent
    cardinality: many_to_one

  - name: agent_wrote_policy
    from: Agent
    to: Policy
    cardinality: one_to_many

  - name: underwriting_for_quote
    from: Underwriting
    to: Quote
    cardinality: one_to_one

  - name: underwriting_for_policy
    from: Underwriting
    to: Policy
    cardinality: one_to_one
