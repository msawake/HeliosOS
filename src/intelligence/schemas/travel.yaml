# TravelForge AI — Travel Booking Ontology Schema
# Object types and relationships for travel planning and booking.

types:
  - name: Traveler
    description: A person who books and takes trips
    icon: user
    properties:
      name: {type: string, required: true}
      email: {type: string, required: true}
      phone: {type: string}
      passport_country: {type: string}
      loyalty_tier: {type: enum, values: [standard, silver, gold, platinum]}
      preferred_airline: {type: string}
      preferred_hotel_chain: {type: string}

  - name: Booking
    description: A travel booking encompassing flights, hotels, and activities
    icon: clipboard-check
    properties:
      booking_ref: {type: string, required: true}
      status: {type: enum, values: [pending, confirmed, cancelled, completed]}
      total_price: {type: number, required: true}
      currency: {type: string}
      booked_date: {type: date}
      travel_start: {type: date}
      travel_end: {type: date}

  - name: Flight
    description: A flight segment within a booking
    icon: plane
    properties:
      airline: {type: string, required: true}
      flight_number: {type: string, required: true}
      origin: {type: string, required: true}
      destination: {type: string, required: true}
      departure_time: {type: date}
      arrival_time: {type: date}
      cabin_class: {type: enum, values: [economy, premium_economy, business, first]}
      price: {type: number}

  - name: Hotel
    description: A hotel stay within a booking
    icon: bed
    properties:
      hotel_name: {type: string, required: true}
      city: {type: string, required: true}
      star_rating: {type: number}
      check_in: {type: date}
      check_out: {type: date}
      room_type: {type: enum, values: [standard, deluxe, suite, penthouse]}
      nightly_rate: {type: number}

  - name: Itinerary
    description: A complete travel itinerary with day-by-day plan
    icon: map
    properties:
      name: {type: string, required: true}
      destination: {type: string, required: true}
      duration_days: {type: number}
      trip_type: {type: enum, values: [business, leisure, bleisure, group]}
      budget: {type: number}
      status: {type: enum, values: [planning, finalized, in_progress, completed]}

  - name: Activity
    description: A tour, excursion, or experience at the destination
    icon: ticket
    properties:
      name: {type: string, required: true}
      category: {type: enum, values: [tour, dining, adventure, cultural, wellness, transport]}
      location: {type: string}
      date: {type: date}
      price: {type: number}
      duration_hours: {type: number}

links:
  - name: has_booking
    from: Traveler
    to: Booking
    cardinality: one_to_many

  - name: includes_flight
    from: Booking
    to: Flight
    cardinality: one_to_many

  - name: includes_hotel
    from: Booking
    to: Hotel
    cardinality: one_to_many

  - name: follows_itinerary
    from: Booking
    to: Itinerary
    cardinality: many_to_one

  - name: itinerary_activity
    from: Itinerary
    to: Activity
    cardinality: one_to_many

  - name: traveler_itinerary
    from: Traveler
    to: Itinerary
    cardinality: one_to_many

  - name: booking_activity
    from: Booking
    to: Activity
    cardinality: one_to_many
