# LeadForge AI — B2B Sales Ontology Schema
# Object types and relationships for B2B lead generation and sales pipeline.

types:
  - name: Customer
    description: A company or organization that is a prospect or active client
    icon: building
    properties:
      name: {type: string, required: true}
      industry: {type: string}
      revenue: {type: number}
      employee_count: {type: number}
      website: {type: string}
      stage: {type: enum, values: [prospect, active, churned]}
      region: {type: string}

  - name: Lead
    description: An individual contact within a customer organization
    icon: user
    properties:
      email: {type: string, required: true}
      first_name: {type: string, required: true}
      last_name: {type: string, required: true}
      title: {type: string}
      score: {type: number}
      source: {type: string}
      status: {type: enum, values: [new, mql, sql, won, lost]}
      last_contacted: {type: date}

  - name: Campaign
    description: A marketing or outreach campaign targeting leads
    icon: megaphone
    properties:
      name: {type: string, required: true}
      channel: {type: enum, values: [email, linkedin, google_ads, phone, webinar]}
      budget: {type: number}
      spent: {type: number}
      status: {type: enum, values: [draft, active, paused, completed]}
      start_date: {type: date}
      end_date: {type: date}

  - name: Deal
    description: A sales opportunity or deal in the pipeline
    icon: handshake
    properties:
      name: {type: string, required: true}
      value: {type: number, required: true}
      stage: {type: enum, values: [qualification, discovery, proposal, negotiation, closed_won, closed_lost]}
      probability: {type: number}
      close_date: {type: date}
      owner: {type: string}

  - name: Invoice
    description: A billing invoice for services rendered
    icon: receipt
    properties:
      invoice_number: {type: string, required: true}
      amount: {type: number, required: true}
      status: {type: enum, values: [draft, sent, paid, overdue, cancelled]}
      due_date: {type: date}
      issued_date: {type: date}

  - name: Meeting
    description: A scheduled meeting or call with a lead or customer
    icon: calendar
    properties:
      title: {type: string, required: true}
      meeting_type: {type: enum, values: [intro, demo, qbr, negotiation, support]}
      scheduled_at: {type: date}
      duration_minutes: {type: number}
      outcome: {type: string}
      attendee_count: {type: number}

links:
  - name: has_lead
    from: Customer
    to: Lead
    cardinality: one_to_many

  - name: has_deal
    from: Customer
    to: Deal
    cardinality: one_to_many

  - name: owns_deal
    from: Lead
    to: Deal
    cardinality: one_to_many

  - name: targeted_by
    from: Lead
    to: Campaign
    cardinality: many_to_many

  - name: generated_by
    from: Lead
    to: Campaign
    cardinality: many_to_one

  - name: has_invoice
    from: Customer
    to: Invoice
    cardinality: one_to_many

  - name: deal_invoice
    from: Deal
    to: Invoice
    cardinality: one_to_many

  - name: has_meeting
    from: Lead
    to: Meeting
    cardinality: one_to_many
