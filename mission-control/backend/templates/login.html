<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Mission Control · Sign in</title>
<style>body{font-family:'SF Mono',monospace;background:#0d1117;color:#c9d1d9;

form{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:32px;width:320px;}
