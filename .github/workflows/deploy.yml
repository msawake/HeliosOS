# Deploys to Cloud Run on push to main.
#
# Requires two GitHub repo secrets (one-time setup via scripts/setup-gcp-wif.sh):
#   GCP_WIF_PROVIDER  — projects/<num>/locations/global/workloadIdentityPools/github-actions/providers/github
#   GCP_DEPLOYER_SA   — forgeos-deployer@<your-project-id>.iam.gserviceaccount.com
#
# What happens on push:
#   1. Authenticate to GCP via Workload Identity Federation (no JSON keys)
#   2. Build backend + dashboard images via Cloud Build, tag with the commit SHA
#   3. Push to Artifact Registry (europe-west1-docker.pkg.dev/.../forgeos/)
#   4. Update both Cloud Run services to the new images
#      (env vars, secrets, and scaling settings are inherited from the prior revision)
name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cloudrun
  cancel-in-progress: false

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}          # Set in GitHub repo → Settings → Variables
  REGION: ${{ vars.GCP_REGION || 'europe-west1' }}
  REPO: forgeos
  BACKEND_SERVICE: forgeos-api
  DASHBOARD_SERVICE: forgeos-dashboard
  MC_SERVICE: forgeos-mission-control
  # Resolved at workflow parse time — must use ${{ }} for REGION, not ${REGION},
  # because env: blocks don't expand shell vars. The literal ${REGION} previously
  # reached Cloud Build and was rejected as an invalid substitution.
  BACKEND_URL: https://forgeos-api-${{ vars.GCP_PROJECT_NUMBER }}.${{ vars.GCP_REGION || 'europe-west1' }}.run.app

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for WIF
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Compute image tags
        id: tags
        run: |
          SHA="${GITHUB_SHA::12}"
          echo "backend_image=${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/forgeos-api:${SHA}" >> "$GITHUB_OUTPUT"
          echo "dashboard_image=${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/forgeos-dashboard:${SHA}" >> "$GITHUB_OUTPUT"
          echo "mc_image=${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/forgeos-mission-control:${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build backend (Cloud Build)
        run: |
          cat > /tmp/backend-cloudbuild.yaml <<EOF
          steps:
            - name: gcr.io/cloud-builders/docker
              args:
                - build
                - -t
                - ${{ steps.tags.outputs.backend_image }}
                - -f
                - infrastructure/docker/Dockerfile
                - --target
                - api
                - .
          images:
            - ${{ steps.tags.outputs.backend_image }}
          options:
            machineType: E2_HIGHCPU_8
          timeout: 1500s
          EOF
          gcloud builds submit \
            --project="${PROJECT_ID}" \
            --config=/tmp/backend-cloudbuild.yaml \
            --gcs-log-dir="gs://${PROJECT_ID}_cloudbuild/logs" \
            --timeout=25m \
            .

      - name: Build dashboard (Cloud Build)
        run: |
          cat > /tmp/dashboard-cloudbuild.yaml <<EOF
          steps:
            - name: gcr.io/cloud-builders/docker
              args:
                - build
                - -t
                - ${{ steps.tags.outputs.dashboard_image }}
                - -f
                - dashboard/Dockerfile
                - --build-arg
                - FORGEOS_API_URL=${BACKEND_URL}
                - --build-arg
                - NEXT_PUBLIC_REQUIRE_AUTH=1
                - .
          images:
            - ${{ steps.tags.outputs.dashboard_image }}
          options:
            machineType: E2_HIGHCPU_8
          timeout: 1500s
          EOF
          gcloud builds submit \
            --project="${PROJECT_ID}" \
            --config=/tmp/dashboard-cloudbuild.yaml \
            --gcs-log-dir="gs://${PROJECT_ID}_cloudbuild/logs" \
            --timeout=25m \
            .

      - name: Build Mission Control (Cloud Build)
        run: |
          cat > /tmp/mc-cloudbuild.yaml <<EOF
          steps:
            - name: gcr.io/cloud-builders/docker
              args:
                - build
                - -t
                - ${{ steps.tags.outputs.mc_image }}
                - -f
                - infrastructure/docker/Dockerfile.mission-control
                - .
          images:
            - ${{ steps.tags.outputs.mc_image }}
          options:
            machineType: E2_HIGHCPU_8
          timeout: 1500s
          EOF
          gcloud builds submit \
            --project="${PROJECT_ID}" \
            --config=/tmp/mc-cloudbuild.yaml \
            --gcs-log-dir="gs://${PROJECT_ID}_cloudbuild/logs" \
            --timeout=25m \
            .

      - name: Deploy backend
        run: |
          gcloud run deploy "${BACKEND_SERVICE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${{ steps.tags.outputs.backend_image }}" \
            --quiet
        # Note: env vars, secrets, CPU/memory, cloudsql connections, and scaling
        # are kept from the previous revision (gcloud deploy without --set-* preserves them).

      - name: Deploy dashboard
        run: |
          gcloud run deploy "${DASHBOARD_SERVICE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${{ steps.tags.outputs.dashboard_image }}" \
            --quiet

      - name: Deploy Mission Control
        run: |
          # First-time deploys need env vars / secrets / scaling defined. Subsequent
          # deploys of the same service inherit them, so this is safe to repeat.
          PROJECT_NUMBER="$(gcloud projects describe ${PROJECT_ID} --format='value(projectNumber)')"
          gcloud run deploy "${MC_SERVICE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${{ steps.tags.outputs.mc_image }}" \
            --service-account="${PROJECT_NUMBER}-compute@developer.gserviceaccount.com" \
            --port=8080 \
            --memory=256Mi --cpu=1 \
            --min-instances=0 --max-instances=2 \
            --timeout=60 \
            --allow-unauthenticated \
            --set-env-vars="FORGEOS_API_URL=${BACKEND_URL}" \
            --set-secrets="FORGEOS_API_TOKEN=forgeos-api-token:latest,FORGEOS_MC_PASSWORD=forgeos-mc-password:latest" \
            --quiet

      - name: Smoke test
        run: |
          BACKEND=$(gcloud run services describe "${BACKEND_SERVICE}" --region="${REGION}" --format='value(status.url)')
          DASH=$(gcloud run services describe "${DASHBOARD_SERVICE}" --region="${REGION}" --format='value(status.url)')
          MC=$(gcloud run services describe "${MC_SERVICE}" --region="${REGION}" --format='value(status.url)')
          echo "Backend:        $BACKEND"
          echo "Dashboard:      $DASH"
          echo "MissionControl: $MC"
          curl -fsS --max-time 30 "$BACKEND/api/health" | tee /dev/stderr | grep -q '"status":"ok"'
          curl -fsS --max-time 30 -o /dev/null -w "dashboard / → %{http_code}\n" "$DASH/"
          curl -fsS --max-time 30 -o /dev/null -w "MC /login → %{http_code}\n" "$MC/login"
