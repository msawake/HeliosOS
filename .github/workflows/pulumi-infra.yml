name: "Pulumi Infrastructure"

# ──────────────────────────────────────────────────────────────────────────────
# State backend: GCS bucket gs://helios-pulumi-state (in ms-tool-sys).
# No PULUMI_ACCESS_TOKEN needed — the WIF service account authenticates to GCS.
#
# GCP authentication is keyless (Workload Identity Federation / OIDC).
# No long-lived service-account JSON key is stored in GitHub.
# The WIF provider + SA addresses are hard-coded per environment below.
# ──────────────────────────────────────────────────────────────────────────────

on:
  # Manual: seed/reset the platform admin login (Django /admin/ + dashboard) on a
  # target environment. Runs a one-off Cloud Run job on the live platform-api
  # image as the platform-api GSA — see the `create-admin` job below.
  workflow_dispatch:
    inputs:
      action:
        description: "What to run"
        required: true
        default: create-admin
        type: choice
        options: [create-admin]
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, pre, pro]
      admin_email:
        description: "Admin email / Django username"
        required: false
        default: "admin@forgeos.local"
      tenant_id:
        description: "Tenant id for the platform (dashboard) admin row"
        required: false
        default: "leadforge"
  pull_request:
    branches: [dev, pre, main]
    paths:
      # Pulumi-only PRs still preview infra plan. App-code PRs run the full
      # pipeline (build a fresh image + preview).
      - "pulumi/**"
      - "src/**"
      - "forgeos_web/**"
      - "stacks/**"
      - "a2h/**"
      - "infrastructure/**"
      - "manage.py"
      - "pyproject.toml"
      - ".github/workflows/pulumi-infra.yml"
  push:
    branches: [dev, pre, main]
    # No path filter on push — any merge / direct push to a deploy branch
    # builds + deploys. Image builds are cheap (~3 min on E2_HIGHCPU_8) and a
    # "Pulumi-only" push still benefits from re-tagging the image with the
    # head commit so the running revision matches the source tree.

env:
  PULUMI_VERSION: "3.130.0"
  PYTHON_VERSION: "3.12"
  PULUMI_BACKEND_URL: "gs://hub-helios-dev-pulumi-state"

permissions:
  contents: read
  pull-requests: write   # needed to post/update PR comments
  id-token: write        # required for OIDC / Workload Identity Federation

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Determine which Pulumi stack and GCP project to target based on the branch.
  # Outputs are consumed by both the preview and deploy jobs.
  # ────────────────────────────────────────────────────────────────────────────
  resolve-stack:
    runs-on: ubuntu-latest
    outputs:
      stack:        ${{ steps.map.outputs.stack }}
      gcp_project:  ${{ steps.map.outputs.gcp_project }}
      wif_provider: ${{ steps.map.outputs.wif_provider }}
      wif_sa:       ${{ steps.map.outputs.wif_sa }}
    steps:
      - id: map
        run: |
          # For PRs use the base branch; for pushes use the pushed ref; for a
          # manual dispatch translate the chosen environment to its branch.
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BRANCH="${{ github.base_ref }}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            case "${{ inputs.environment }}" in
              dev) BRANCH="dev"  ;;
              pre) BRANCH="pre"  ;;
              pro) BRANCH="main" ;;
              *)   echo "::error::Unsupported environment: ${{ inputs.environment }}"; exit 1 ;;
            esac
          else
            BRANCH="${{ github.ref_name }}"
          fi

          case "$BRANCH" in
            dev)
              echo "stack=dev"                                                                                                                >> "$GITHUB_OUTPUT"
              echo "gcp_project=ms-awake-dev"                                                                                                >> "$GITHUB_OUTPUT"
              echo "wif_provider=projects/980612545569/locations/global/workloadIdentityPools/github-actions/providers/github-oidc"          >> "$GITHUB_OUTPUT"
              echo "wif_sa=helios-pulumi-deploy@ms-awake-dev.iam.gserviceaccount.com"                                                        >> "$GITHUB_OUTPUT"
              ;;
            pre)
              echo "stack=pre"                                                                                                                >> "$GITHUB_OUTPUT"
              echo "gcp_project=ms-awake-pre"                                                                                                >> "$GITHUB_OUTPUT"
              echo "wif_provider=projects/276870250956/locations/global/workloadIdentityPools/github-actions/providers/github-oidc"          >> "$GITHUB_OUTPUT"
              echo "wif_sa=helios-pulumi-deploy@ms-awake-pre.iam.gserviceaccount.com"                                                        >> "$GITHUB_OUTPUT"
              ;;
            main)
              echo "stack=pro"                                                                                                                >> "$GITHUB_OUTPUT"
              echo "gcp_project=ms-awake-pro"                                                                                                >> "$GITHUB_OUTPUT"
              echo "wif_provider=projects/179734091472/locations/global/workloadIdentityPools/github-actions/providers/github-oidc"          >> "$GITHUB_OUTPUT"
              echo "wif_sa=helios-pulumi-deploy@ms-awake-pro.iam.gserviceaccount.com"                                                        >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unsupported branch: $BRANCH"
              exit 1
              ;;
          esac

  # ────────────────────────────────────────────────────────────────────────────
  # Build images — Cloud Build submits the platform-api image (multi-stage
  # Dockerfile → api, mcp, migrations all share this image, differing only by
  # command). The resulting short-SHA tag is consumed by the deploy job, which
  # overrides `platform_api_tag` + `migrations_tag` in Pulumi config IN-FLIGHT
  # via `pulumi config set` before `pulumi up` — no commit-back to
  # `Pulumi.{stack}.yaml` needed; the image tag is pinned by what just built.
  #
  # Runs only on push (not PR previews) so the PR diff stays cheap. PR-time
  # previews see whatever tag is in `Pulumi.{stack}.yaml`; the deploy will
  # override to the freshly-built tag and the plan-hash check warns rather
  # than fails when this happens (see "Verify plan hash" below).
  #
  # IAM: requires the WIF SA to have `cloudbuild.builds.editor` on the target
  # project + `storage.objectAdmin` on the implicit `<project>_cloudbuild`
  # source-staging bucket + `artifactregistry.writer` on the `forgeos` repo.
  # ────────────────────────────────────────────────────────────────────────────
  build-images:
    if: github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip-deploy]')
    needs: resolve-stack
    runs-on: ubuntu-latest
    outputs:
      platform_api_tag: ${{ steps.build.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ needs.resolve-stack.outputs.wif_provider }}
          service_account:            ${{ needs.resolve-stack.outputs.wif_sa }}
      - uses: google-github-actions/setup-gcloud@v2
      - id: build
        name: Build platform-api image via Cloud Build
        env:
          GCP_PROJECT: ${{ needs.resolve-stack.outputs.gcp_project }}
        run: |
          set -euo pipefail
          TAG=$(git rev-parse --short HEAD)
          IMAGE="europe-west1-docker.pkg.dev/${GCP_PROJECT}/forgeos/platform-api:${TAG}"
          echo "Submitting Cloud Build for ${IMAGE}…"
          gcloud builds submit . \
            --project="${GCP_PROJECT}" \
            --config=infrastructure/cloudbuild.platform-api.yaml \
            --substitutions=_TAG="${TAG}" \
            --gcs-source-staging-dir="gs://${GCP_PROJECT}_cloudbuild/source"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "✅ Built and pushed ${IMAGE}"

  # ────────────────────────────────────────────────────────────────────────────
  # Preview — runs on every PR, posts/updates a comment with the plan output.
  # ────────────────────────────────────────────────────────────────────────────
  preview:
    if: github.event_name == 'pull_request'
    needs: resolve-stack
    runs-on: ubuntu-latest
    concurrency:
      group: pulumi-preview-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      # Authenticate to GCP via Workload Identity Federation (keyless).
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ needs.resolve-stack.outputs.wif_provider }}
          service_account:            ${{ needs.resolve-stack.outputs.wif_sa }}

      # Install gcloud SDK.  install_components handles gke-gcloud-auth-plugin
      # correctly on hosted runners — gcloud components install is disabled on
      # GitHub-hosted runners and will fail; this action uses apt under the hood.
      - uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Install the Pulumi CLI at the pinned version (install-only mode:
      # omitting `command` causes the action to exit after installation).
      - name: Install Pulumi CLI
        uses: pulumi/actions@v6
        with:
          pulumi-version: ${{ env.PULUMI_VERSION }}

      - name: Install Python dependencies
        working-directory: pulumi
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --quiet -r requirements.txt

      - name: Pulumi preview
        id: preview
        working-directory: pulumi
        env:
          CLOUDSDK_COMPUTE_REGION:  europe-west1
          # Required by kubectl / pulumi-kubernetes when talking to GKE clusters.
          USE_GKE_GCLOUD_AUTH_PLUGIN: "True"
        run: |
          # Ensure output file exists even if preview fails early
          echo "Preview did not produce output" > /tmp/preview-output.txt
          source venv/bin/activate
          
          # Login to GCS state backend
          pulumi login "$PULUMI_BACKEND_URL"

          set +e
          # Select the target stack
          pulumi stack select ${{ needs.resolve-stack.outputs.stack }} 2>&1 | tee -a /tmp/preview-output.txt
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          # Run preview and capture output
          OUTPUT=$(pulumi preview --diff --color never 2>&1)
          EXIT_CODE=$?
          set -e

          echo "$OUTPUT" > /tmp/preview-output.txt

          if [ $EXIT_CODE -eq 0 ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
          fi

          # Compute a stable fingerprint of the resource-change lines only.
          # Strips timestamps, diagnostics, and progress noise so the hash is
          # reproducible across two runs of an identical plan.
          PLAN_HASH=$(echo "$OUTPUT" \
            | grep -E '^\s*([\+\~\-]|(create|update|delete|replace|same)\b)' \
            | sha256sum \
            | cut -d' ' -f1)
          echo "plan_hash=$PLAN_HASH" >> "$GITHUB_OUTPUT"

          exit $EXIT_CODE

      # Always post (or update) a PR comment, even when the preview step fails.
      - name: Post PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/preview-output.txt', 'utf8');
            const stack     = '${{ needs.resolve-stack.outputs.stack }}';
            const project   = '${{ needs.resolve-stack.outputs.gcp_project }}';
            const ok        = '${{ steps.preview.outputs.status }}' === 'success';
            const icon      = ok ? '✅' : '❌';
            const planHash  = '${{ steps.preview.outputs.plan_hash }}';

            // GitHub comment body limit is 65 536 characters.
            const MAX_LEN = 60_000;
            const body_content = output.length > MAX_LEN
              ? output.substring(0, MAX_LEN) + '\n\n… (truncated — see workflow logs for full output)'
              : output;

            // The hidden hash marker lets the deploy job verify that the plan
            // has not changed between PR review and merge.  Format must stay
            // stable — the deploy job parses it with a regex.
            const hashMarker = planHash
              ? `\n<!-- pulumi-plan-hash:${stack}:${planHash} -->`
              : '';

            const body = [
              `## ${icon} Pulumi Preview — \`${stack}\` (${project})`,
              '',
              '<details>',
              '<summary>Click to expand preview output</summary>',
              '',
              '```',
              body_content,
              '```',
              '',
              '</details>',
              '',
              `*Workflow: ${context.workflow} | Run: [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})*`,
              hashMarker,
            ].join('\n');

            // Find an existing bot comment for this stack so we update rather
            // than accumulate a new comment on every push to the PR branch.
            const MARKER = `Pulumi Preview — \`${stack}\``;
            const { data: comments } = await github.rest.issues.listComments({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(
              c => c.user.type === 'Bot' && c.body.includes(MARKER)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ────────────────────────────────────────────────────────────────────────────
  # Deploy — runs on merge/push to a protected branch.
  # The `environment` field enables GitHub environment protection rules
  # (required reviewers, deployment gates, etc.) per stack.
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    if: github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip-deploy]')
    needs: [resolve-stack, build-images]
    runs-on: ubuntu-latest
    concurrency:
      group: pulumi-deploy-${{ github.ref }}
      cancel-in-progress: false
    environment: ${{ needs.resolve-stack.outputs.stack }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ needs.resolve-stack.outputs.wif_provider }}
          service_account:            ${{ needs.resolve-stack.outputs.wif_sa }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Pulumi CLI
        uses: pulumi/actions@v6
        with:
          pulumi-version: ${{ env.PULUMI_VERSION }}

      - name: Install Python dependencies
        working-directory: pulumi
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --quiet -r requirements.txt

      # ── Plan-hash verification ────────────────────────────────────────────────
      # Re-run pulumi preview and compute the same stable fingerprint that the
      # preview job embedded in the PR comment.  If the hashes differ the plan
      # has changed since the PR was reviewed (state drift, concurrent merges,
      # etc.) and we abort before touching real infrastructure.
      # ── Override image tags with the freshly-built ones ──────────────────
      # `pulumi config set` modifies the on-disk Pulumi.{stack}.yaml ephemerally
      # in the runner workspace (NOT committed back) so subsequent `pulumi
      # preview` + `up` see the new tag. platform-api / mcp / migrations all
      # share the same image (same Dockerfile, different commands), so
      # `migrations_tag` gets the same value.
      - name: Pin freshly-built platform-api tag
        working-directory: pulumi
        env:
          NEW_TAG: ${{ needs.build-images.outputs.platform_api_tag }}
        run: |
          source venv/bin/activate
          pulumi login "$PULUMI_BACKEND_URL"
          pulumi stack select ${{ needs.resolve-stack.outputs.stack }}
          pulumi config set forgeos-gcp:platform_api_tag "$NEW_TAG"
          pulumi config set forgeos-gcp:migrations_tag   "$NEW_TAG"
          echo "Pinned platform_api_tag + migrations_tag = $NEW_TAG"

      - name: Pre-deploy preview (plan hash)
        id: predeploy_preview
        working-directory: pulumi
        env:
          CLOUDSDK_COMPUTE_REGION:  europe-west1
          USE_GKE_GCLOUD_AUTH_PLUGIN: "True"
        run: |
          source venv/bin/activate
          pulumi login "$PULUMI_BACKEND_URL"
          pulumi stack select ${{ needs.resolve-stack.outputs.stack }}

          DEPLOY_OUTPUT=$(pulumi preview --diff --color never 2>&1)
          echo "$DEPLOY_OUTPUT" > /tmp/predeploy-preview-output.txt

          DEPLOY_HASH=$(echo "$DEPLOY_OUTPUT" \
            | grep -E '^\s*([\+\~\-]|(create|update|delete|replace|same)\b)' \
            | sha256sum \
            | cut -d' ' -f1)
          echo "deploy_hash=$DEPLOY_HASH" >> "$GITHUB_OUTPUT"

      - name: Verify plan hash against PR comment
        uses: actions/github-script@v7
        env:
          DEPLOY_HASH: ${{ steps.predeploy_preview.outputs.deploy_hash }}
        with:
          script: |
            const stack       = '${{ needs.resolve-stack.outputs.stack }}';
            const deployHash  = process.env.DEPLOY_HASH;
            const commitSha   = context.sha;

            // ── 1. Find the PR associated with this merge commit ──────────────
            // The commits/{sha}/pulls endpoint returns the PR(s) that introduced
            // this commit — the most reliable way to go from a merge SHA to a PR.
            let prNumber = null;
            try {
              const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                commit_sha: commitSha,
              });
              // Prefer the merged PR targeting the pushed branch; fall back to
              // the first result if there is exactly one.
              const merged = prs.filter(p => p.state === 'closed' && p.merged_at);
              if (merged.length > 0) {
                prNumber = merged[0].number;
              } else if (prs.length === 1) {
                prNumber = prs[0].number;
              }
            } catch (err) {
              core.warning(`Could not look up PR for commit ${commitSha}: ${err.message}`);
            }

            if (!prNumber) {
              core.warning(
                'No associated PR found for this commit — skipping plan-hash ' +
                'verification.  This is expected for direct pushes or the first ' +
                'deploy.  Proceeding with pulumi up.'
              );
              return;
            }

            // ── 2. Find the bot comment that contains the plan hash ───────────
            // Paginate to handle PRs with many comments.
            let reviewHash = null;
            const hashPattern = new RegExp(
              `<!--\\s*pulumi-plan-hash:${stack}:([a-f0-9]{64})\\s*-->`
            );
            let page = 1;
            while (true) {
              const { data: comments } = await github.rest.issues.listComments({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: prNumber,
                per_page:     100,
                page,
              });
              if (comments.length === 0) break;

              // Walk in reverse so we pick up the *latest* bot comment if the
              // preview was re-run multiple times on the same PR.
              for (let i = comments.length - 1; i >= 0; i--) {
                const c = comments[i];
                if (c.user.type !== 'Bot') continue;
                const m = hashPattern.exec(c.body);
                if (m) { reviewHash = m[1]; break; }
              }
              if (reviewHash || comments.length < 100) break;
              page++;
            }

            if (!reviewHash) {
              core.warning(
                `No plan-hash marker found in PR #${prNumber} comments for ` +
                `stack \`${stack}\`.  This can happen if the preview job ran ` +
                `before this verification was introduced.  Proceeding with ` +
                `pulumi up — please ensure future PRs go through the preview job.`
              );
              return;
            }

            // ── 3. Compare ────────────────────────────────────────────────────
            core.info(`PR #${prNumber} reviewed hash : ${reviewHash}`);
            core.info(`Pre-deploy hash              : ${deployHash}`);

            if (reviewHash !== deployHash) {
              // A freshly-built image tag was pinned before this step, so the
              // diff almost always includes a `platform_api_tag` change that
              // the PR preview didn't see. Warn instead of failing — the diff
              // is auditable in the workflow logs.
              core.warning(
                `Plan hash differs from PR comment — this is expected when ` +
                `the build-images job produced a new tag.\n` +
                `  Reviewed hash : ${reviewHash}\n` +
                `  Current hash  : ${deployHash}\n` +
                `\nReview the updated preview output in this run's logs.`
              );
            } else {
              core.info('✅ Plan hash matches — proceeding with pulumi up.');
            }

      - name: Pulumi up
        working-directory: pulumi
        env:
          CLOUDSDK_COMPUTE_REGION:  europe-west1
          USE_GKE_GCLOUD_AUTH_PLUGIN: "True"
        run: |
          source venv/bin/activate
          pulumi login "$PULUMI_BACKEND_URL"
          pulumi stack select ${{ needs.resolve-stack.outputs.stack }}
          pulumi up --yes --color never

  # ────────────────────────────────────────────────────────────────────────────
  # Create / reset the platform admin login — manual (workflow_dispatch) only.
  #
  # Why this exists: the FastAPI→Django migration dropped the bootstrap-admin
  # seeding, so a fresh deploy has no usable Django /admin/ or dashboard login.
  # This runs a one-off Cloud Run job on the live platform-api image executing
  # `manage.py ensure_admin` (idempotent). It runs as the platform-api GSA — the
  # only identity granted accessor on BOTH the database-url and the
  # bootstrap-admin-password secrets.
  #
  # The `environment:` gate means a `pro` run still goes through that GitHub
  # environment's protection rules (required reviewers, etc.).
  # ────────────────────────────────────────────────────────────────────────────
  create-admin:
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'create-admin'
    needs: resolve-stack
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-stack.outputs.stack }}
    concurrency:
      group: forgeos-create-admin-${{ needs.resolve-stack.outputs.stack }}
      cancel-in-progress: false
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ needs.resolve-stack.outputs.wif_provider }}
          service_account:            ${{ needs.resolve-stack.outputs.wif_sa }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Run ensure_admin as a one-off Cloud Run job
        env:
          PROJECT:     ${{ needs.resolve-stack.outputs.gcp_project }}
          REGION:      europe-west1
          ADMIN_EMAIL: ${{ inputs.admin_email }}
          TENANT_ID:   ${{ inputs.tenant_id }}
        run: |
          set -euo pipefail

          # Clone the image + VPC wiring from the existing migrate job, and the
          # service account from the live platform-api service (that GSA is the
          # one with access to both the DB and bootstrap-admin secrets).
          IMAGE=$(gcloud run services describe forgeos-platform-api \
            --project="$PROJECT" --region="$REGION" \
            --format='value(spec.template.spec.containers[0].image)')
          SA=$(gcloud run services describe forgeos-platform-api \
            --project="$PROJECT" --region="$REGION" \
            --format='value(spec.template.spec.serviceAccountName)')
          NETWORK=$(gcloud run jobs describe forgeos-django-migrate \
            --project="$PROJECT" --region="$REGION" \
            --format='value(spec.template.spec.template.spec.vpcAccess.networkInterfaces[0].network)')
          SUBNET=$(gcloud run jobs describe forgeos-django-migrate \
            --project="$PROJECT" --region="$REGION" \
            --format='value(spec.template.spec.template.spec.vpcAccess.networkInterfaces[0].subnetwork)')

          echo "image=$IMAGE"
          echo "sa=$SA  network=$NETWORK  subnet=$SUBNET"
          test -n "$IMAGE" && test -n "$SA" && test -n "$NETWORK" && test -n "$SUBNET"

          # Create-or-update the one-off job, then execute and wait.
          gcloud run jobs deploy forgeos-ensure-admin \
            --project="$PROJECT" --region="$REGION" \
            --image="$IMAGE" \
            --service-account="$SA" \
            --network="$NETWORK" --subnet="$SUBNET" --vpc-egress=all-traffic \
            --max-retries=1 --task-timeout=300 \
            --set-secrets="DATABASE_URL=forgeos-database-url:latest,FORGEOS_BOOTSTRAP_ADMIN_PASSWORD=forgeos-bootstrap-admin-password:latest" \
            --set-env-vars="FORGEOS_BOOTSTRAP_ADMIN_EMAIL=${ADMIN_EMAIL},FORGEOS_TENANT_ID=${TENANT_ID}" \
            --command="python" \
            --args="manage.py,ensure_admin"

          gcloud run jobs execute forgeos-ensure-admin \
            --project="$PROJECT" --region="$REGION" --wait

          echo "✅ ensure_admin ran. Log in at the platform-api /admin/ as ${ADMIN_EMAIL}"
          echo "   (password = the forgeos-bootstrap-admin-password secret value)."
