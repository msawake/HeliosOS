# Portable CI: build OCI images on GitHub Actions → GHCR.
# Cloud Build (infrastructure/docker/cloudbuild.yaml) remains an optional GCP path.
name: Build and push images

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  # GHCR: lowercase owner/package — portable across clouds; pull from any Kubernetes cluster.
  API_IMAGE_NAME: forgeos-api
  WEB_IMAGE_NAME: forgeos-web

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install and test
        run: |
          # ./a2h is a sibling package vendored in-repo; install it first so
          # src/platform/a2h.py can resolve `from a2h.models import ...`.
          pip install -e ./a2h --quiet
          pip install -e ".[dev]" --quiet
          PYTHONPATH=. python -m pytest tests/ -q --tb=short \
            --deselect tests/test_model_client.py::TestFactory::test_create_openai_without_sdk

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    # PRs: build only; push on default branch or tags
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (API)
        id: meta_api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.API_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Docker meta (Web)
        id: meta_web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.WEB_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Build API image (local test)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile
          target: api
          push: false
          load: true
          tags: forgeos-api:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Assert API image size (< 800 MB)
        run: |
          size=$(docker image inspect forgeos-api:ci-test --format='{{.Size}}')
          echo "API image size: $size bytes ($(echo "scale=1; $size/1024/1024" | bc) MB)"
          if [ "$size" -gt 838860800 ]; then
            echo "::error::API image exceeds 800 MB budget"
            exit 1
          fi

      - name: Push API image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile
          target: api
          push: true
          tags: ${{ steps.meta_api.outputs.tags }}
          labels: ${{ steps.meta_api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image (local test)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dashboard/Dockerfile
          push: false
          load: true
          tags: forgeos-web:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Assert Web image size (< 400 MB)
        run: |
          size=$(docker image inspect forgeos-web:ci-test --format='{{.Size}}')
          echo "Web image size: $size bytes ($(echo "scale=1; $size/1024/1024" | bc) MB)"
          if [ "$size" -gt 419430400 ]; then
            echo "::error::Web image exceeds 400 MB budget"
            exit 1
          fi

      - name: Push Web image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dashboard/Dockerfile
          push: true
          tags: ${{ steps.meta_web.outputs.tags }}
          labels: ${{ steps.meta_web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
