<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <title>Agent Lifecycle: Deploy, Wire, and Invoke phases from deployment through invocation</title>

  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#60A5FA"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#FB923C"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#34D399"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#A78BFA"/>
    </marker>

    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#60A5FA" flood-opacity="0.15"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#FB923C" flood-opacity="0.15"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#34D399" flood-opacity="0.15"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="#0F172A"/>

  <!-- ======================== PHASE LABELS ======================== -->

  <text x="32" y="38" fill="#60A5FA" font-size="11" font-weight="700" letter-spacing="2" opacity="0.9">DEPLOY PHASE</text>
  <line x1="32" y1="44" x2="155" y2="44" stroke="#60A5FA" stroke-width="1.5" opacity="0.4"/>

  <text x="32" y="340" fill="#FB923C" font-size="11" font-weight="700" letter-spacing="2" opacity="0.9">WIRE PHASE</text>
  <line x1="32" y1="346" x2="140" y2="346" stroke="#FB923C" stroke-width="1.5" opacity="0.4"/>

  <text x="32" y="545" fill="#34D399" font-size="11" font-weight="700" letter-spacing="2" opacity="0.9">INVOKE PHASE</text>
  <line x1="32" y1="551" x2="155" y2="551" stroke="#34D399" stroke-width="1.5" opacity="0.4"/>

  <!-- ======================== DEPLOY PHASE ======================== -->
  <!-- Center column x=560, box width=240, so boxes span 440..680 -->

  <!-- Entry: API / Dashboard / Wizard -->
  <rect x="440" y="55" width="240" height="38" rx="8" fill="#1E293B" stroke="#60A5FA" stroke-width="1.5" filter="url(#glow-blue)"/>
  <text x="560" y="79" fill="#F8FAFC" font-size="13" font-weight="600" text-anchor="middle">API / Dashboard / Wizard</text>

  <line x1="560" y1="93" x2="560" y2="110" stroke="#475569" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Create AgentDefinition -->
  <rect x="440" y="114" width="240" height="38" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="560" y="138" fill="#F8FAFC" font-size="12" font-weight="500" text-anchor="middle">Create AgentDefinition</text>

  <line x1="560" y1="152" x2="560" y2="168" stroke="#475569" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Validate Name -->
  <rect x="440" y="172" width="240" height="38" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="560" y="196" fill="#F8FAFC" font-size="12" font-weight="500" text-anchor="middle">Validate Name</text>

  <line x1="560" y1="210" x2="560" y2="226" stroke="#475569" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Register in DB -->
  <rect x="440" y="230" width="240" height="38" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="560" y="254" fill="#F8FAFC" font-size="12" font-weight="500" text-anchor="middle">Register in DB</text>

  <line x1="560" y1="268" x2="560" y2="284" stroke="#475569" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Scaffold Files -->
  <rect x="440" y="288" width="240" height="38" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="560" y="312" fill="#F8FAFC" font-size="12" font-weight="500" text-anchor="middle">Scaffold Files</text>

  <line x1="560" y1="326" x2="560" y2="342" stroke="#475569" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- adapter.create_agent() -->
  <rect x="440" y="346" width="240" height="38" rx="8" fill="#1E293B" stroke="#60A5FA" stroke-width="1.5" filter="url(#glow-blue)"/>
  <text x="560" y="370" fill="#60A5FA" font-size="12" font-weight="600" text-anchor="middle" font-family="'SF Mono',SFMono-Regular,Menlo,monospace">adapter.create_agent()</text>

  <!-- Arrow to Wire phase -->
  <line x1="560" y1="384" x2="560" y2="406" stroke="#475569" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ======================== WIRE PHASE ======================== -->
  <!-- Diamond center at (560, 440). A 45-deg rotated square with side ~74 gives
       corner-to-corner span of ~74. So diamond tips at y=406 (top) and y=474 (bottom),
       x=526 (left) and x=594 (right). -->

  <g transform="translate(560, 440)">
    <rect x="-24" y="-24" width="48" height="48" rx="3" fill="#1E293B" stroke="#FB923C" stroke-width="1.5" transform="rotate(45)" filter="url(#glow-orange)"/>
    <text y="-4" fill="#FB923C" font-size="9" font-weight="700" text-anchor="middle">Exec</text>
    <text y="7" fill="#FB923C" font-size="9" font-weight="700" text-anchor="middle">Type?</text>
  </g>
  <!-- Diamond tips: top=406, bottom=474, left=526, right=594 -->

  <!-- 5 branches from diamond -->

  <!-- ALWAYS_ON (far left, x=120) -->
  <path d="M 526 440 L 120 440 L 120 488" stroke="#FB923C" stroke-width="1.2" fill="none" marker-end="url(#arrow-orange)"/>
  <rect x="40" y="492" width="160" height="34" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="120" y="514" fill="#F8FAFC" font-size="11" font-weight="500" text-anchor="middle" font-family="'SF Mono',SFMono-Regular,Menlo,monospace">start_loop()</text>
  <text x="120" y="540" fill="#94A3B8" font-size="10" text-anchor="middle">ALWAYS_ON</text>
  <rect x="82" y="550" width="76" height="20" rx="10" fill="#083344" stroke="#22D3EE" stroke-width="0.8"/>
  <text x="120" y="564" fill="#22D3EE" font-size="9" font-weight="600" text-anchor="middle">RUNNING</text>

  <!-- SCHEDULED (x=330) -->
  <path d="M 526 440 L 330 440 L 330 488" stroke="#FB923C" stroke-width="1.2" fill="none" marker-end="url(#arrow-orange)"/>
  <rect x="225" y="492" width="210" height="34" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="330" y="514" fill="#F8FAFC" font-size="11" font-weight="500" text-anchor="middle" font-family="'SF Mono',SFMono-Regular,Menlo,monospace">scheduler.add_job(cron)</text>
  <text x="330" y="540" fill="#94A3B8" font-size="10" text-anchor="middle">SCHEDULED</text>
  <rect x="303" y="550" width="54" height="20" rx="10" fill="#1E293B" stroke="#64748B" stroke-width="0.8"/>
  <text x="330" y="564" fill="#94A3B8" font-size="9" font-weight="600" text-anchor="middle">IDLE</text>

  <!-- EVENT_DRIVEN (center, x=560) -->
  <line x1="560" y1="474" x2="560" y2="488" stroke="#FB923C" stroke-width="1.2" fill="none" marker-end="url(#arrow-orange)"/>
  <rect x="455" y="492" width="210" height="34" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="560" y="514" fill="#F8FAFC" font-size="11" font-weight="500" text-anchor="middle" font-family="'SF Mono',SFMono-Regular,Menlo,monospace">event_bus.subscribe()</text>
  <text x="560" y="540" fill="#94A3B8" font-size="10" text-anchor="middle">EVENT_DRIVEN</text>
  <rect x="533" y="550" width="54" height="20" rx="10" fill="#1E293B" stroke="#64748B" stroke-width="0.8"/>
  <text x="560" y="564" fill="#94A3B8" font-size="9" font-weight="600" text-anchor="middle">IDLE</text>

  <!-- REFLEX (x=790) -->
  <path d="M 594 440 L 790 440 L 790 488" stroke="#FB923C" stroke-width="1.2" fill="none" marker-end="url(#arrow-orange)"/>
  <rect x="700" y="492" width="180" height="34" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="790" y="514" fill="#F8FAFC" font-size="11" font-weight="500" text-anchor="middle" font-family="'SF Mono',SFMono-Regular,Menlo,monospace">set status IDLE</text>
  <text x="790" y="540" fill="#94A3B8" font-size="10" text-anchor="middle">REFLEX</text>
  <rect x="763" y="550" width="54" height="20" rx="10" fill="#1E293B" stroke="#64748B" stroke-width="0.8"/>
  <text x="790" y="564" fill="#94A3B8" font-size="9" font-weight="600" text-anchor="middle">IDLE</text>

  <!-- AUTONOMOUS (far right, x=1020) -->
  <path d="M 594 440 L 1020 440 L 1020 488" stroke="#FB923C" stroke-width="1.2" fill="none" marker-end="url(#arrow-orange)"/>
  <rect x="930" y="492" width="180" height="34" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="1020" y="514" fill="#F8FAFC" font-size="11" font-weight="500" text-anchor="middle" font-family="'SF Mono',SFMono-Regular,Menlo,monospace">create async task</text>
  <text x="1020" y="540" fill="#94A3B8" font-size="10" text-anchor="middle">AUTONOMOUS</text>
  <rect x="982" y="550" width="76" height="20" rx="10" fill="#083344" stroke="#22D3EE" stroke-width="0.8"/>
  <text x="1020" y="564" fill="#22D3EE" font-size="9" font-weight="600" text-anchor="middle">RUNNING</text>

  <!-- ======================== INVOKE PHASE ======================== -->

  <!-- Trigger -->
  <rect x="40" y="600" width="240" height="42" rx="8" fill="#1E293B" stroke="#34D399" stroke-width="1.5" filter="url(#glow-green)"/>
  <text x="160" y="619" fill="#F8FAFC" font-size="12" font-weight="600" text-anchor="middle">Trigger</text>
  <text x="160" y="634" fill="#94A3B8" font-size="9" text-anchor="middle">API call / cron / event / user request</text>

  <line x1="280" y1="621" x2="308" y2="621" stroke="#475569" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Load agent + history -->
  <rect x="312" y="600" width="175" height="42" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="400" y="626" fill="#F8FAFC" font-size="12" font-weight="500" text-anchor="middle">Load agent + history</text>

  <line x1="487" y1="621" x2="515" y2="621" stroke="#475569" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- adapter.invoke() -->
  <rect x="519" y="600" width="175" height="42" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="607" y="626" fill="#F8FAFC" font-size="12" font-weight="500" text-anchor="middle" font-family="'SF Mono',SFMono-Regular,Menlo,monospace">adapter.invoke()</text>

  <line x1="694" y1="621" x2="722" y2="621" stroke="#475569" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- build_tool_definitions() -->
  <rect x="726" y="600" width="220" height="42" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="836" y="626" fill="#F8FAFC" font-size="12" font-weight="500" text-anchor="middle" font-family="'SF Mono',SFMono-Regular,Menlo,monospace">build_tool_definitions()</text>

  <!-- Arrow down into the agentic loop -->
  <path d="M 836 642 L 836 660 L 250 660 L 250 714" stroke="#475569" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>

  <!-- ======================== AGENTIC LOOP BOX ======================== -->
  <rect x="130" y="686" width="770" height="120" rx="10" fill="#0F172A" stroke="#A78BFA" stroke-width="2.5"/>
  <text x="150" y="706" fill="#A78BFA" font-size="11" font-weight="700" letter-spacing="1.5">AGENTIC LOOP</text>

  <!-- llm_router.chat() -->
  <rect x="160" y="718" width="180" height="32" rx="8" fill="#1E293B" stroke="#A78BFA" stroke-width="1"/>
  <text x="250" y="739" fill="#F8FAFC" font-size="11" font-weight="500" text-anchor="middle" font-family="'SF Mono',SFMono-Regular,Menlo,monospace">llm_router.chat()</text>

  <!-- Arrow to Tool calls? diamond -->
  <line x1="340" y1="734" x2="388" y2="734" stroke="#475569" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Tool calls? diamond (center at 425, 734) -->
  <g transform="translate(425, 734)">
    <rect x="-22" y="-22" width="44" height="44" rx="2" fill="#1E293B" stroke="#A78BFA" stroke-width="1.2" transform="rotate(45)"/>
    <text y="-3" fill="#A78BFA" font-size="8" font-weight="700" text-anchor="middle">Tool</text>
    <text y="7" fill="#A78BFA" font-size="8" font-weight="700" text-anchor="middle">calls?</text>
  </g>
  <!-- Diamond tips: left=394, right=456, top=703, bottom=765 -->

  <!-- YES branch: down from diamond to tool_executor row -->
  <path d="M 425 765 L 425 775 L 390 775 L 390 776" stroke="#475569" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <text x="436" y="775" fill="#34D399" font-size="8" font-weight="700">Yes</text>

  <!-- tool_executor.execute() -->
  <rect x="300" y="780" width="180" height="22" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="390" y="795" fill="#F8FAFC" font-size="9" font-weight="500" text-anchor="middle" font-family="'SF Mono',SFMono-Regular,Menlo,monospace">tool_executor.execute()</text>

  <!-- Arrow right to Append results -->
  <line x1="480" y1="791" x2="502" y2="791" stroke="#475569" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Append results -->
  <rect x="506" y="780" width="128" height="22" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="570" y="795" fill="#F8FAFC" font-size="9" font-weight="500" text-anchor="middle">Append results</text>

  <!-- Loop-back dashed arrow: up from Append results, left, back to llm_router -->
  <path d="M 570 780 L 570 762 L 250 762 L 250 750" stroke="#A78BFA" stroke-width="1" fill="none" marker-end="url(#arrow-purple)" stroke-dasharray="4,3"/>

  <!-- NO branch: right from diamond -->
  <line x1="456" y1="734" x2="580" y2="734" stroke="#475569" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="466" y="728" fill="#EF4444" font-size="8" font-weight="700">No</text>

  <!-- Return text -->
  <rect x="584" y="718" width="130" height="32" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="649" y="739" fill="#F8FAFC" font-size="11" font-weight="500" text-anchor="middle">Return text</text>

  <!-- Arrow from Return text through loop border to Save session -->
  <line x1="714" y1="734" x2="960" y2="734" stroke="#475569" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Save session -->
  <rect x="964" y="716" width="130" height="36" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="1029" y="739" fill="#F8FAFC" font-size="11" font-weight="500" text-anchor="middle">Save session</text>

  <!-- Arrow down to AgentResult -->
  <line x1="1029" y1="752" x2="1029" y2="774" stroke="#475569" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- AgentResult (terminal) -->
  <rect x="964" y="778" width="130" height="36" rx="8" fill="#1E293B" stroke="#34D399" stroke-width="1.5" filter="url(#glow-green)"/>
  <text x="1029" y="801" fill="#34D399" font-size="12" font-weight="700" text-anchor="middle">AgentResult</text>

  <!-- ======================== STATUS BADGES ======================== -->

  <text x="40" y="860" fill="#94A3B8" font-size="10" font-weight="600" letter-spacing="1.5">STATUS</text>

  <!-- idle -->
  <rect x="100" y="849" width="46" height="20" rx="10" fill="#1E293B" stroke="#64748B" stroke-width="0.8"/>
  <text x="123" y="863" fill="#94A3B8" font-size="9" font-weight="600" text-anchor="middle">idle</text>

  <!-- running -->
  <rect x="154" y="849" width="64" height="20" rx="10" fill="#083344" stroke="#22D3EE" stroke-width="0.8"/>
  <text x="186" y="863" fill="#22D3EE" font-size="9" font-weight="600" text-anchor="middle">running</text>

  <!-- paused -->
  <rect x="226" y="849" width="56" height="20" rx="10" fill="#172554" stroke="#60A5FA" stroke-width="0.8"/>
  <text x="254" y="863" fill="#60A5FA" font-size="9" font-weight="600" text-anchor="middle">paused</text>

  <!-- stopped -->
  <rect x="290" y="849" width="60" height="20" rx="10" fill="#1E293B" stroke="#64748B" stroke-width="0.8"/>
  <text x="320" y="863" fill="#94A3B8" font-size="9" font-weight="600" text-anchor="middle">stopped</text>

  <!-- completed -->
  <rect x="358" y="849" width="76" height="20" rx="10" fill="#052E16" stroke="#34D399" stroke-width="0.8"/>
  <text x="396" y="863" fill="#34D399" font-size="9" font-weight="600" text-anchor="middle">completed</text>

  <!-- failed -->
  <rect x="442" y="849" width="50" height="20" rx="10" fill="#450A0A" stroke="#EF4444" stroke-width="0.8"/>
  <text x="467" y="863" fill="#EF4444" font-size="9" font-weight="600" text-anchor="middle">failed</text>

  <!-- quarantined -->
  <rect x="500" y="849" width="86" height="20" rx="10" fill="#431407" stroke="#FB923C" stroke-width="0.8"/>
  <text x="543" y="863" fill="#FB923C" font-size="9" font-weight="600" text-anchor="middle">quarantined</text>

</svg>