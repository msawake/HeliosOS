<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <title>ForgeOS - Stack Adapter Comparison</title>

  <!-- Background -->
  <rect width="1200" height="780" fill="#0F172A" rx="16"/>

  <!-- Title -->
  <text x="600" y="44" text-anchor="middle" fill="#F8FAFC" font-size="24" font-weight="700">Stack Adapters</text>
  <text x="600" y="66" text-anchor="middle" fill="#94A3B8" font-size="13">Five pluggable runtimes implementing the same AgentStackAdapter interface, all governed by the kernel</text>

  <!-- Column headers -->
  <!-- ForgeOS -->
  <rect x="30" y="90" width="210" height="115" rx="12" fill="#1E293B" stroke="#60A5FA" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="90" width="210" height="5" rx="2" fill="#60A5FA"/>
  <text x="135" y="128" text-anchor="middle" fill="#60A5FA" font-size="18" font-weight="700">ForgeOS</text>
  <text x="135" y="148" text-anchor="middle" fill="#94A3B8" font-size="11">Native agentic loop</text>
  <rect x="95" y="160" width="80" height="18" rx="9" fill="#60A5FA20"/>
  <text x="135" y="173" text-anchor="middle" fill="#60A5FA" font-size="10" font-weight="700">DEFAULT</text>

  <!-- CrewAI -->
  <rect x="260" y="90" width="210" height="115" rx="12" fill="#1E293B" stroke="#A78BFA" stroke-width="2" filter="url(#shadow)"/>
  <rect x="260" y="90" width="210" height="5" rx="2" fill="#A78BFA"/>
  <text x="365" y="128" text-anchor="middle" fill="#A78BFA" font-size="18" font-weight="700">CrewAI</text>
  <text x="365" y="148" text-anchor="middle" fill="#94A3B8" font-size="11">Role-based crews</text>
  <rect x="320" y="160" width="90" height="18" rx="9" fill="#A78BFA20"/>
  <text x="365" y="173" text-anchor="middle" fill="#A78BFA" font-size="10" font-weight="700">SDK: crewai</text>

  <!-- ADK -->
  <rect x="490" y="90" width="210" height="115" rx="12" fill="#1E293B" stroke="#FB923C" stroke-width="2" filter="url(#shadow)"/>
  <rect x="490" y="90" width="210" height="5" rx="2" fill="#FB923C"/>
  <text x="595" y="128" text-anchor="middle" fill="#FB923C" font-size="18" font-weight="700">Google ADK</text>
  <text x="595" y="148" text-anchor="middle" fill="#94A3B8" font-size="11">Enterprise agent kit</text>
  <rect x="540" y="160" width="110" height="18" rx="9" fill="#FB923C20"/>
  <text x="595" y="173" text-anchor="middle" fill="#FB923C" font-size="10" font-weight="700">SDK: google-adk</text>

  <!-- OpenClaw -->
  <rect x="720" y="90" width="210" height="115" rx="12" fill="#1E293B" stroke="#06B6D4" stroke-width="2" filter="url(#shadow)"/>
  <rect x="720" y="90" width="210" height="5" rx="2" fill="#06B6D4"/>
  <text x="825" y="128" text-anchor="middle" fill="#06B6D4" font-size="18" font-weight="700">OpenClaw</text>
  <text x="825" y="148" text-anchor="middle" fill="#94A3B8" font-size="11">HTTP gateway subprocess</text>
  <rect x="780" y="160" width="90" height="18" rx="9" fill="#06B6D420"/>
  <text x="825" y="173" text-anchor="middle" fill="#06B6D4" font-size="10" font-weight="700">Node.js</text>

  <!-- Sandbox -->
  <rect x="950" y="90" width="210" height="115" rx="12" fill="#1E293B" stroke="#F472B6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="950" y="90" width="210" height="5" rx="2" fill="#F472B6"/>
  <text x="1055" y="128" text-anchor="middle" fill="#F472B6" font-size="18" font-weight="700">Sandbox</text>
  <text x="1055" y="148" text-anchor="middle" fill="#94A3B8" font-size="11">Docker container</text>
  <rect x="1010" y="160" width="90" height="18" rx="9" fill="#F472B620"/>
  <text x="1055" y="173" text-anchor="middle" fill="#F472B6" font-size="10" font-weight="700">Docker</text>

  <!-- ================================================================ -->
  <!-- Kernel gate banner -->
  <!-- ================================================================ -->
  <rect x="30" y="220" width="1130" height="32" rx="8" fill="#F8717115" stroke="#F87171" stroke-width="1"/>
  <text x="600" y="241" text-anchor="middle" fill="#FCA5A5" font-size="12" font-weight="600">KERNEL GATE: Every tool call in every adapter is checked via runtime.check_tool() before execution</text>

  <!-- ================================================================ -->
  <!-- Comparison rows -->
  <!-- ================================================================ -->

  <!-- Runtime -->
  <rect x="30" y="268" width="1130" height="42" rx="0" fill="#1E293B40"/>
  <text x="45" y="294" fill="#F8FAFC" font-size="12" font-weight="600">Runtime</text>
  <text x="135" y="294" text-anchor="middle" fill="#93C5FD" font-size="11">Platform agentic loop</text>
  <text x="365" y="294" text-anchor="middle" fill="#C4B5FD" font-size="11">Crew.kickoff() in thread</text>
  <text x="595" y="294" text-anchor="middle" fill="#FED7AA" font-size="11">Runner.run_async() stream</text>
  <text x="825" y="294" text-anchor="middle" fill="#A5F3FC" font-size="11">HTTP POST /v1/chat</text>
  <text x="1055" y="294" text-anchor="middle" fill="#F9A8D4" font-size="11">Container subprocess</text>

  <!-- LLM Routing -->
  <text x="45" y="333" fill="#F8FAFC" font-size="12" font-weight="600">LLM Routing</text>
  <text x="135" y="333" text-anchor="middle" fill="#94A3B8" font-size="11">Via LLMRouter</text>
  <text x="365" y="333" text-anchor="middle" fill="#94A3B8" font-size="11">Via LiteLLM (internal)</text>
  <text x="595" y="333" text-anchor="middle" fill="#94A3B8" font-size="11">AnthropicLlm / LiteLlm</text>
  <text x="825" y="333" text-anchor="middle" fill="#94A3B8" font-size="11">Via gateway process</text>
  <text x="1055" y="333" text-anchor="middle" fill="#94A3B8" font-size="11">Isolated runtime</text>

  <!-- Tool Bridging -->
  <rect x="30" y="350" width="1130" height="42" rx="0" fill="#1E293B40"/>
  <text x="45" y="376" fill="#F8FAFC" font-size="12" font-weight="600">Tool Bridging</text>
  <text x="135" y="376" text-anchor="middle" fill="#93C5FD" font-size="11">Direct tool_executor</text>
  <text x="365" y="376" text-anchor="middle" fill="#C4B5FD" font-size="11">BaseTool subclass</text>
  <text x="595" y="376" text-anchor="middle" fill="#FED7AA" font-size="11">FunctionTool wrapper</text>
  <text x="825" y="376" text-anchor="middle" fill="#A5F3FC" font-size="11">Tools in AGENTS.md</text>
  <text x="1055" y="376" text-anchor="middle" fill="#F9A8D4" font-size="11">Host-proxied tools</text>

  <!-- Multi-turn -->
  <text x="45" y="415" fill="#F8FAFC" font-size="12" font-weight="600">Multi-turn</text>
  <text x="135" y="415" text-anchor="middle" fill="#94A3B8" font-size="11">Full history param</text>
  <text x="365" y="415" text-anchor="middle" fill="#94A3B8" font-size="11">In task description</text>
  <text x="595" y="415" text-anchor="middle" fill="#94A3B8" font-size="11">ADK session service</text>
  <text x="825" y="415" text-anchor="middle" fill="#94A3B8" font-size="11">Platform fallback</text>
  <text x="1055" y="415" text-anchor="middle" fill="#94A3B8" font-size="11">Platform fallback</text>

  <!-- Fallback -->
  <rect x="30" y="430" width="1130" height="42" rx="0" fill="#1E293B40"/>
  <text x="45" y="456" fill="#F8FAFC" font-size="12" font-weight="600">Fallback</text>
  <text x="135" y="456" text-anchor="middle" fill="#93C5FD" font-size="11">-- (IS the fallback)</text>
  <text x="365" y="456" text-anchor="middle" fill="#C4B5FD" font-size="11">ForgeOS agentic loop</text>
  <text x="595" y="456" text-anchor="middle" fill="#FED7AA" font-size="11">ForgeOS agentic loop</text>
  <text x="825" y="456" text-anchor="middle" fill="#A5F3FC" font-size="11">ForgeOS agentic loop</text>
  <text x="1055" y="456" text-anchor="middle" fill="#F9A8D4" font-size="11">ForgeOS agentic loop</text>

  <!-- Best For -->
  <text x="45" y="495" fill="#F8FAFC" font-size="12" font-weight="600">Best For</text>
  <text x="135" y="495" text-anchor="middle" fill="#93C5FD" font-size="11" font-weight="600">Default choice</text>
  <text x="365" y="495" text-anchor="middle" fill="#C4B5FD" font-size="11" font-weight="600">Multi-role collab</text>
  <text x="595" y="495" text-anchor="middle" fill="#FED7AA" font-size="11" font-weight="600">Google ecosystem</text>
  <text x="825" y="495" text-anchor="middle" fill="#A5F3FC" font-size="11" font-weight="600">Markdown-driven</text>
  <text x="1055" y="495" text-anchor="middle" fill="#F9A8D4" font-size="11" font-weight="600">Untrusted code</text>

  <!-- Column dividers -->
  <line x1="250" y1="268" x2="250" y2="510" stroke="#334155" stroke-width="1" stroke-dasharray="2,4"/>
  <line x1="480" y1="268" x2="480" y2="510" stroke="#334155" stroke-width="1" stroke-dasharray="2,4"/>
  <line x1="710" y1="268" x2="710" y2="510" stroke="#334155" stroke-width="1" stroke-dasharray="2,4"/>
  <line x1="940" y1="268" x2="940" y2="510" stroke="#334155" stroke-width="1" stroke-dasharray="2,4"/>

  <!-- ================================================================ -->
  <!-- Invocation Flow Diagrams -->
  <!-- ================================================================ -->
  <text x="600" y="546" text-anchor="middle" fill="#F8FAFC" font-size="18" font-weight="700">Invocation Flow</text>

  <!-- ForgeOS flow -->
  <rect x="30" y="562" width="210" height="130" rx="8" fill="#1E293B" stroke="#60A5FA" stroke-width="1"/>
  <text x="135" y="580" text-anchor="middle" fill="#60A5FA" font-size="11" font-weight="700">ForgeOS Native</text>
  <text x="44" y="600" fill="#94A3B8" font-size="10">invoke()</text>
  <text x="50" y="616" fill="#94A3B8" font-size="10">  &#8594; build_tool_definitions()</text>
  <text x="50" y="632" fill="#FCA5A5" font-size="10">  &#8594; kernel.check_tool()</text>
  <text x="50" y="648" fill="#93C5FD" font-size="10">  &#8594; run_agentic_loop()</text>
  <text x="50" y="664" fill="#94A3B8" font-size="10">  &#8594; AgentResult</text>

  <!-- CrewAI flow -->
  <rect x="260" y="562" width="210" height="130" rx="8" fill="#1E293B" stroke="#A78BFA" stroke-width="1"/>
  <text x="365" y="580" text-anchor="middle" fill="#A78BFA" font-size="11" font-weight="700">CrewAI</text>
  <text x="274" y="600" fill="#94A3B8" font-size="10">invoke()</text>
  <text x="280" y="616" fill="#94A3B8" font-size="10">  &#8594; Crew(agents, tasks)</text>
  <text x="280" y="632" fill="#FCA5A5" font-size="10">  &#8594; kernel gate in _run()</text>
  <text x="280" y="648" fill="#C4B5FD" font-size="10">  &#8594; run_in_executor(kickoff)</text>
  <text x="280" y="664" fill="#94A3B8" font-size="10">  &#8594; AgentResult</text>

  <!-- ADK flow -->
  <rect x="490" y="562" width="210" height="130" rx="8" fill="#1E293B" stroke="#FB923C" stroke-width="1"/>
  <text x="595" y="580" text-anchor="middle" fill="#FB923C" font-size="11" font-weight="700">Google ADK</text>
  <text x="504" y="600" fill="#94A3B8" font-size="10">invoke()</text>
  <text x="510" y="616" fill="#94A3B8" font-size="10">  &#8594; Runner.run_async()</text>
  <text x="510" y="632" fill="#FCA5A5" font-size="10">  &#8594; kernel gate in wrapper</text>
  <text x="510" y="648" fill="#FED7AA" font-size="10">  &#8594; async for event in stream</text>
  <text x="510" y="664" fill="#94A3B8" font-size="10">  &#8594; AgentResult</text>

  <!-- OpenClaw flow -->
  <rect x="720" y="562" width="210" height="130" rx="8" fill="#1E293B" stroke="#06B6D4" stroke-width="1"/>
  <text x="825" y="580" text-anchor="middle" fill="#06B6D4" font-size="11" font-weight="700">OpenClaw</text>
  <text x="734" y="600" fill="#94A3B8" font-size="10">invoke()</text>
  <text x="740" y="616" fill="#94A3B8" font-size="10">  &#8594; _ensure_gateway()</text>
  <text x="740" y="632" fill="#FCA5A5" font-size="10">  &#8594; kernel gate in proxy</text>
  <text x="740" y="648" fill="#A5F3FC" font-size="10">  &#8594; HTTP POST /v1/chat</text>
  <text x="740" y="664" fill="#94A3B8" font-size="10">  &#8594; AgentResult</text>

  <!-- Sandbox flow -->
  <rect x="950" y="562" width="210" height="130" rx="8" fill="#1E293B" stroke="#F472B6" stroke-width="1"/>
  <text x="1055" y="580" text-anchor="middle" fill="#F472B6" font-size="11" font-weight="700">Sandbox</text>
  <text x="964" y="600" fill="#94A3B8" font-size="10">invoke()</text>
  <text x="970" y="616" fill="#94A3B8" font-size="10">  &#8594; docker run ...</text>
  <text x="970" y="632" fill="#FCA5A5" font-size="10">  &#8594; kernel gate on host</text>
  <text x="970" y="648" fill="#F9A8D4" font-size="10">  &#8594; collect output</text>
  <text x="970" y="664" fill="#94A3B8" font-size="10">  &#8594; AgentResult</text>

  <!-- Fallback note -->
  <text x="600" y="720" text-anchor="middle" fill="#475569" font-size="12" font-style="italic">When SDK is unavailable, CrewAI / ADK / OpenClaw / Sandbox all fall back to the ForgeOS native agentic loop</text>

  <!-- Kernel gate legend -->
  <rect x="400" y="738" width="400" height="24" rx="6" fill="#F8717110" stroke="#F8717140" stroke-width="1"/>
  <text x="600" y="755" text-anchor="middle" fill="#FCA5A5" font-size="11" font-weight="600">Red lines = kernel permission check (same in every adapter)</text>
</svg>
