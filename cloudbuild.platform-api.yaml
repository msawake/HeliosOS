steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - infrastructure/docker/Dockerfile
      - --target
      - api
      - -t
      - europe-west1-docker.pkg.dev/admachina-atomic-test-84/forgeos/platform-api:${_TAG}
      - .
images:
  - europe-west1-docker.pkg.dev/admachina-atomic-test-84/forgeos/platform-api:${_TAG}
options:
  machineType: E2_HIGHCPU_8
timeout: 1800s
