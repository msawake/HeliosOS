config:
  gcp:project: admachina-atomic-test-84
  gcp:region: europe-west1
  forgeos-gcp:network_cidr: 10.20.0.0/16
  forgeos-gcp:pods_cidr: 10.40.0.0/14
  forgeos-gcp:services_cidr: 10.44.0.0/20
  forgeos-gcp:cloud_sql_tier: db-f1-micro
  # platform-api image (built from main @ 2d012db). Used by platform-api, the
  # MCP server, AND the worker tier.
  forgeos-gcp:platform_api_tag: "9e1f1c3c"
  # Next.js dashboard image. Built with --build-arg FORGEOS_API_URL=<platform-api>
  # (Next.js serializes the /api rewrite destination into routes-manifest at
  # `next build`, so the runtime env is ignored for the proxy).
  forgeos-gcp:dashboard_tag: "000360e0"
  # Migrations Cloud Run Job image (applies infrastructure/database/*.sql).
  forgeos-gcp:migrations_tag: f38d42d
  # Full Drive scope so per-agent SAs (treasury demo) can read/write folders
  # SHARED with their email; default drive.file only sees app-created files.
  forgeos-gcp:drive_scopes: drive
  # Redis (Memorystore) backs the durable per-turn worker tier (Redis Streams).
  forgeos-gcp:enable_redis: "true"
  forgeos-gcp:redis_memory_gb: "1"
  # Always-on GKE worker that drains the queue / resumes HITL runs.
  forgeos-gcp:worker_replicas: "1"
  # Kernel enforcement mode. "production" enforces real kernel checks INCLUDING
  # licensing (requires a license row per tenant, else tool calls are denied
  # "Unknown tenant"). Empty = permissive (local-dev) licensing — kernel still
  # enforces ACL/approvals/budgets, just skips the commercial license gate.
  forgeos-gcp:kernel_mode: "production"
