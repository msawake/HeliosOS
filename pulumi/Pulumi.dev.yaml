config:
  gcp:project: ms-awake-dev
  gcp:region: europe-west1
  forgeos-gcp:network_cidr: "10.10.0.0/20"
  forgeos-gcp:pods_cidr: "10.40.0.0/14"
  forgeos-gcp:services_cidr: "10.44.0.0/20"
  forgeos-gcp:cloud_sql_tier: "db-f1-micro"
  # Redis (Memorystore) backs the durable per-turn worker tier (Redis Streams).
  forgeos-gcp:enable_redis: "true"
  forgeos-gcp:redis_memory_gb: "1"
  # Kernel enforcement mode. Empty = permissive (dev) licensing — kernel still
  # enforces ACL/approvals/budgets, just skips the commercial license gate.
  forgeos-gcp:kernel_mode: ""
  # Always-on GKE worker that drains the queue / resumes HITL runs.
  forgeos-gcp:worker_replicas: "1"
  # Image tags resolved by CI on push to main (see .github/workflows).
  forgeos-gcp:platform_api_tag: "latest"
  forgeos-gcp:migrations_tag: "latest"
  # Central Artifact Registry where Cloud Build pushes release images.
  forgeos-gcp:registry_project: ms-awake-sys
  # Pinned to a specific build (not "latest") so pulumi up can't revert the
  # dashboard to an image lacking the NEXT_PUBLIC_GCP_PROJECT_ID build-arg
  # (which the wizard's SA-provisioning flow needs). Bump on new dashboard builds.
  forgeos-gcp:dashboard_tag: "e67621f"
  # Full Drive scope so per-agent SAs (treasury demo) can read/write folders
  # SHARED with their email; default drive.file only sees app-created files.
  forgeos-gcp:drive_scopes: drive
  # LLM gateway (atlas-router, OpenAI-compatible). Provider `vllm` reads
  # this + VLLM_API_KEY at boot. Same dev gateway across forgeos envs.
  forgeos-gcp:vllm_base_url: https://atlas-router.ally-code-dev.makingscience.com/v1
  # Secrets intentionally omitted from this stack. The Secrets component
  # creates empty placeholders in Secret Manager when these config keys are
  # missing (see components/secrets.py:_secret) — the deploy still succeeds.
  # Populate later, if/when needed, via `gcloud secrets versions add` or by
  # `pulumi config set --secret forgeos-gcp:<key>` on the KMS-backed stack.
  forgeos-gcp:deletion_protection: "false"
  forgeos-gcp:environment: "dev"
