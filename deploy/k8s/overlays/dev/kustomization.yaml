# Dev overlay — single replica, HITL seeding enabled, dev hostname.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: forgeos

resources:
  - ../../base

patches:
  - path: hostname-patch.yaml
    target:
      kind: Ingress
      name: forgeos
  - path: replicas-patch.yaml
  - path: hpa-patch.yaml
    target:
      kind: HorizontalPodAutoscaler
      name: forgeos-api

configMapGenerator:
  - name: forgeos-config
    behavior: merge
    literals:
      - COMPANY_ID=leadforge
      - FORGEOS_SEED_HITL=1
      - FORGEOS_ALLOW_DEV_LOGIN=1

images:
  - name: forgeos-api
    newTag: dev
  - name: forgeos-web
    newTag: dev
