apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: forgeos

# NOTE: as of the thin-client migration, ForgeOS no longer ships a server
# image. The CLI runs locally and Mission Control is a desktop client. The
# remaining manifests below describe shared infra (namespace, configmaps,
# PVCs, NetworkPolicy) that may still be useful when deploying agents as
# standalone Kubernetes workloads alongside other systems.
resources:
  - namespace.yaml
  - configmap.yaml
  - pvc.yaml
  - networkpolicy.yaml

commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: forgeos
