# ----------------------------------------------------------------------------
# Ingress for the forgeos namespace.
#
# The `host` value below is a placeholder. Override per environment via a
# Kustomize overlay (see deploy/k8s/overlays/{dev,staging,prod}/).
#
# TLS: cert-manager annotation points to a cluster-issuer named
# `letsencrypt-prod`. Install cert-manager + define the issuer before apply:
#   https://cert-manager.io/docs/installation/
#
# The `forgeos-tls` secret is created automatically by cert-manager when the
# cluster-issuer resolves the DNS challenge for the host below.
# ----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: forgeos
  labels:
    app.kubernetes.io/name: forgeos
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # WebSocket support for /ws/agents
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - forgeos.example.local
      secretName: forgeos-tls
  rules:
    - host: forgeos.example.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: forgeos-api
                port:
                  number: 5000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: forgeos-api
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: forgeos-web
                port:
                  number: 3000
