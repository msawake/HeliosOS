apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgeos-web
  labels:
    app.kubernetes.io/name: forgeos
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: forgeos
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forgeos
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: web
          image: forgeos-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: SKIP_API_REWRITE
              value: "1"
            # Server-side fetch to API (SSR). Browser uses same-origin /api via Ingress.
            - name: INTERNAL_API_URL
              value: http://forgeos-api.forgeos.svc.cluster.local:5000
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
