apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgeos-web
  labels:
    app.kubernetes.io/name: forgeos
    app.kubernetes.io/component: web
spec:
  # Bumped to 2 so the PodDisruptionBudget (minAvailable: 1) is satisfiable.
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: forgeos
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forgeos
        app.kubernetes.io/component: web
    spec:
      # Non-root UID matches dashboard/Dockerfile `nextjs` user (1001).
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      volumes:
        # /tmp for any temp files (required because readOnlyRootFilesystem)
        - name: tmp
          emptyDir: {}
        # Next.js writes incremental cache here even in standalone mode
        - name: next-cache
          emptyDir: {}
      containers:
        - name: web
          image: forgeos-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: next-cache
              mountPath: /app/.next/cache
          env:
            - name: NODE_ENV
              value: production
            - name: SKIP_API_REWRITE
              value: "1"
            # Server-side fetch to API (SSR). Browser uses same-origin /api via Ingress.
            - name: INTERNAL_API_URL
              value: http://forgeos-api.forgeos.svc.cluster.local:5000
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
