# PodDisruptionBudget for the API tier.
# Ensures at least one pod stays available during voluntary disruptions
# (node drain, cluster upgrade, kubectl rollout restart). Prod overlays
# should bump minAvailable to 2.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: forgeos-api
  labels:
    app.kubernetes.io/name: forgeos
    app.kubernetes.io/component: api
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: forgeos
      app.kubernetes.io/component: api
