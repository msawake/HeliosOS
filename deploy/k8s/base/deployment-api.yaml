apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgeos-api
  labels:
    app.kubernetes.io/name: forgeos
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: forgeos
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forgeos
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: forgeos-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
          envFrom:
            - configMapRef:
                name: forgeos-config
          env:
            # Optional: mount secrets via env (create Secret forgeos-secrets)
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: forgeos-secrets
                  key: ANTHROPIC_API_KEY
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: forgeos-secrets
                  key: OPENAI_API_KEY
                  optional: true
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: forgeos-secrets
                  key: DATABASE_URL
                  optional: true
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: forgeos-secrets
                  key: REDIS_URL
                  optional: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
