# ----------------------------------------------------------------------------
# PersistentVolumeClaims for ForgeOS runtime writable paths.
#
# The API deployment runs with `readOnlyRootFilesystem: true`, so any path the
# platform writes to (agent scaffolding, OpenClaw state) must be mounted from
# a PVC or emptyDir. These claims cover the long-lived paths; ephemeral dirs
# like /tmp and /app/.cache are handled inline in deployment-api.yaml.
# ----------------------------------------------------------------------------

# Agent workspace — where PlatformExecutor scaffolds files under
# agents/{shared|personal|clients}/{name}/
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: forgeos-agents
  labels:
    app.kubernetes.io/name: forgeos
    app.kubernetes.io/component: api
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---

# OpenClaw gateway state — SOUL.md, AGENTS.md, HEARTBEAT.md, memory/
# Path: /home/forgeos/.openclaw-forgeos (OPENCLAW_STATE_DIR default)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: forgeos-openclaw-state
  labels:
    app.kubernetes.io/name: forgeos
    app.kubernetes.io/component: api
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
