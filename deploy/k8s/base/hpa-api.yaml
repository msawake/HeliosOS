# ----------------------------------------------------------------------------
# HorizontalPodAutoscaler for the API tier.
#
# Scales on CPU (primary signal) and memory (secondary). Overlays can patch
# minReplicas/maxReplicas per environment. In-flight LLM invocations can hold
# connections for minutes, so the scale-down stabilization window is generous.
# ----------------------------------------------------------------------------
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: forgeos-api
  labels:
    app.kubernetes.io/name: forgeos
    app.kubernetes.io/component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: forgeos-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # 5 min cooldown — avoid thrashing
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
