# ----------------------------------------------------------------------------
# ServiceMonitor for Prometheus Operator.
#
# Tells a `prometheus-operator`-managed Prometheus instance to scrape the
# `/metrics` endpoint on the forgeos-api service every 30s.
#
# Requires:
#   - Prometheus Operator installed (https://prometheus-operator.dev)
#   - A Prometheus CR that selects ServiceMonitors with label:
#       release: prometheus (common default)
#
# Not applied by `deploy/k8s/base/kustomization.yaml` because many clusters
# don't run Prometheus Operator. Apply manually or include in a prod overlay:
#   kubectl apply -f deploy/k8s/base/observability/
# ----------------------------------------------------------------------------
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: forgeos-api
  labels:
    app.kubernetes.io/name: forgeos
    app.kubernetes.io/component: api
    release: prometheus  # adjust to match your Prometheus CR's serviceMonitorSelector
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: forgeos
      app.kubernetes.io/component: api
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      honorLabels: true
  namespaceSelector:
    matchNames:
      - forgeos
