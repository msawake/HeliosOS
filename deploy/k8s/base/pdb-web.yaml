# PodDisruptionBudget for the Web (dashboard) tier.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: forgeos-web
  labels:
    app.kubernetes.io/name: forgeos
    app.kubernetes.io/component: web
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: forgeos
      app.kubernetes.io/component: web
