# ----------------------------------------------------------------------------
# Chaos Mesh: CPU Stress
#
# Pins one API pod to 90% CPU for 5 minutes. Tests that:
#   1. HPA scales up (CPU target is 70%)
#   2. Readiness probe fails cleanly if pod becomes unresponsive
#   3. Liveness probe doesn't trigger premature restart
#   4. Alerts for high latency fire (tool duration histogram)
#
# Apply:  kubectl apply -f deploy/k8s/chaos/cpu-stress.yaml
# Remove: kubectl delete -f deploy/k8s/chaos/cpu-stress.yaml
# ----------------------------------------------------------------------------
apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: forgeos-api-cpu-stress
  namespace: forgeos
spec:
  mode: one
  selector:
    namespaces:
      - forgeos
    labelSelectors:
      app.kubernetes.io/name: forgeos
      app.kubernetes.io/component: api
  stressors:
    cpu:
      workers: 2
      load: 90
  duration: "5m"
