# ----------------------------------------------------------------------------
# Chaos Mesh: Pod Failure
#
# Randomly kills one forgeos-api pod every 5 minutes for a 30-minute window.
# Tests that:
#   1. HPA scales up quickly when a pod dies
#   2. PodDisruptionBudget (minAvailable: 1) is respected
#   3. In-flight requests fail gracefully (not silently lost)
#   4. Scheduled/event-driven agents recover after pod restart
#
# Apply:
#   kubectl apply -f deploy/k8s/chaos/pod-failure.yaml
#
# Remove:
#   kubectl delete -f deploy/k8s/chaos/pod-failure.yaml
#
# Observe:
#   kubectl get pods -n forgeos -w
#   kubectl logs -n forgeos -l app.kubernetes.io/component=api --tail=100 -f
# ----------------------------------------------------------------------------
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: forgeos-api-pod-kill
  namespace: forgeos
spec:
  action: pod-kill
  mode: one                 # kill exactly one pod per run
  selector:
    namespaces:
      - forgeos
    labelSelectors:
      app.kubernetes.io/name: forgeos
      app.kubernetes.io/component: api
  scheduler:
    cron: "@every 5m"
  duration: "30m"
