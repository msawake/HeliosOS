# ----------------------------------------------------------------------------
# Helios OS local stack — Postgres (pgvector) + Redis + platform API.
#
# Zero-config quick start:
#   docker compose up
#
# Defaults are tuned for local testing:
#   - DB_PASSWORD        defaults to "forgeoslocal"
#   - ANTHROPIC_API_KEY  empty -> LLM calls are simulated (no key required)
#   - API auth           disabled (set FORGEOS_AUTH_DISABLED= empty to enable)
#
# For real LLM calls: `cp .env.example .env`, set ANTHROPIC_API_KEY (and/or
# OPENAI_API_KEY / GOOGLE_API_KEY), then `docker compose up` again — compose
# reads ./.env automatically.
#
# Dashboard UI: http://localhost:3000
# API:          http://localhost:5000  (docs at /docs, health at /api/health)
# ----------------------------------------------------------------------------

name: forgeos

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: leadforge
      POSTGRES_USER: leadforge_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-forgeoslocal}
    ports:
      # 5433 avoids conflicts with a local Postgres on 5432; bound to loopback
      # because the default password is well-known.
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # No init scripts — the migration runner (src/core/migrations.py)
      # creates the schema on boot for clean versioning.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadforge_admin -d leadforge"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
      target: api
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      - DATABASE_URL=postgresql://leadforge_admin:${DB_PASSWORD:-forgeoslocal}@postgres:5432/leadforge
      - REDIS_URL=redis://redis:6379
      # Empty keys -> simulated LLM responses (graceful degradation).
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # Local default: no API auth, so the CLI works with just a URL.
      # Set FORGEOS_AUTH_DISABLED= (empty) to require bearer tokens.
      - FORGEOS_AUTH_DISABLED=${FORGEOS_AUTH_DISABLED:-1}
      # Don't seed the two demo HITL approvals — set =1 to bring them back.
      - FORGEOS_SEED_HITL=${FORGEOS_SEED_HITL:-0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Boots the platform and serves the Django ASGI app (run_django_server).
    command: ["python", "-m", "src.bootstrap", "--dashboard", "--loop"]

  # Celery worker tier — drives enqueued agent turns / resumes off Redis.
  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
      target: api
    environment:
      - DATABASE_URL=postgresql://leadforge_admin:${DB_PASSWORD:-forgeoslocal}@postgres:5432/leadforge
      - REDIS_URL=redis://redis:6379
      - FORGEOS_RUNTIME_WORKERS=1
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "forgeos_web.celery_app", "worker", "-Q", "agents,agents_resume,scheduled,agents_longrun", "--loglevel=info"]

  # Celery Beat — fires SCHEDULED agents (PeriodicTask) + maintenance.
  beat:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
      target: api
    environment:
      - DATABASE_URL=postgresql://leadforge_admin:${DB_PASSWORD:-forgeoslocal}@postgres:5432/leadforge
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "forgeos_web.celery_app", "beat", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler", "--loglevel=info"]

  # Next.js dashboard UI. Lives in its own repo now
  # (github.com/antonibergas-hue/forgeos-dashboard); this service builds it from
  # a sibling checkout (../forgeos-dashboard). Next's rewrites proxy /api/* to
  # the `app` service, so the browser only ever talks to http://localhost:3000
  # (same origin). The live-status WebSocket connects straight to the API on :5000.
  dashboard:
    build:
      context: ../forgeos-dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_REQUIRE_AUTH: "0"
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      # Read at RUNTIME by the /api proxy route handler (src/app/api/[...path]/route.ts).
      # Must point at the API service over the compose network (not localhost, this box).
      - FORGEOS_API_URL=http://app:5000
    depends_on:
      - app

volumes:
  postgres_data:
