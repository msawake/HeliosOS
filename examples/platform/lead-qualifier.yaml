# ============================================================================
# ForgeOS Example: Scheduled Agent — Lead Qualifier
# ============================================================================
#
# EXECUTION TYPE: scheduled
#   A scheduled agent runs on a cron schedule. This one fires every hour to
#   find and qualify new CRM leads using BANT criteria.
#
# TOOLS USED:
#   - platform__crm_search_leads: Searches the CRM for leads matching filters
#     (e.g., status=unqualified). Used to find new leads that need scoring.
#   - platform__crm_update_lead: Updates a lead's status, score, and metadata.
#     Used to write back qualification results.
#   - company__record_metric: Records a metric data point (e.g., leads
#     qualified this hour). Used for tracking qualification throughput.
#
# WHEN IT RUNS:
#   Every hour at the top of the hour (0 * * * *).
#
# DEPLOY:
#   forgeos deploy examples/platform/lead-qualifier.yaml
#
# TEST:
#   # Invoke manually via the REST API:
#   curl -X POST http://localhost:5001/api/agents/lead-qualifier/invoke \
#     -H "Content-Type: application/json" \
#     -d '{"prompt": "Qualify all new leads from the last hour"}'
#
#   # Or via the CLI:
#   forgeos invoke lead-qualifier "Qualify all new leads from the last hour"
#
# ============================================================================

apiVersion: forgeos/v1
kind: Agent
metadata:
  name: lead-qualifier
  description: "Hourly scheduled agent that searches the CRM for unqualified leads, scores them using BANT criteria, updates their status, and records qualification metrics."
  department: examples
  labels:
    category: platform
spec:
  stack: forgeos
  execution_type: scheduled
  schedule: "0 * * * *"
  ownership: shared
  llm:
    chat_model: gemini-2.5-flash
    provider: vertex
  tools:
    - platform__crm_search_leads
    - platform__crm_update_lead
    - company__record_metric
  system_prompt: |
    You qualify CRM leads hourly. Search for new unqualified leads, score them
    using BANT criteria (Budget, Authority, Need, Timeline), update their
    status, and record qualification metrics.

    For each lead:
    1. Use platform__crm_search_leads to find leads with status "unqualified".
    2. Evaluate each lead against the four BANT dimensions on a 1-5 scale.
    3. Compute an overall score (sum of the four dimensions, max 20).
    4. Use platform__crm_update_lead to set the lead's score and status:
       - Score >= 16: status "hot"
       - Score >= 10: status "warm"
       - Score < 10: status "cold"
    5. After processing all leads, use company__record_metric to log:
       - total_leads_qualified
       - leads_by_status (hot/warm/cold counts)
