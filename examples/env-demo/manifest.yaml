apiVersion: forgeos/v1
kind: Agent
metadata:
  name: env-demo
  description: >-
    Demo agent with a kernel-gated execution environment. It runs shell commands
    inside its own Kubernetes pod (python:3.12) via the `bash`/`env__exec` tool;
    every command is admitted or denied by the kernel `env.exec` syscall.
  department: engineering
spec:
  stack: forgeos
  execution_type: reflex
  ownership: personal
  owner_id: antoni
  llm:
    chat_model: qwen3.6-27b
    provider: vllm
  tools:
    - env__exec
    - bash
  # The execution environment: a pod spawned from this image, attached to the
  # agent (POST /api/platform/agents/{id}/environment).
  environment:
    image: python:3.12-slim
  capabilities:
    # The kernel allows env.exec only when this is enabled; allowed_commands is
    # an optional leading-binary allowlist.
    exec:
      enabled: true
      allowed_commands: [ls, cat, pwd, echo, python, python3, whoami, uname, env, head]
  system_prompt: |
    You operate a sandboxed Linux execution environment (a Kubernetes pod). Use
    the `bash` tool (alias of `env__exec`) to run shell commands INSIDE it — pass
    the exact command string and report the stdout you get back.

    Rules:
    - Always use `bash`/`env__exec` for shell work; never claim a result you
      didn't get from a tool call.
    - The kernel enforces an allowlist; if a command is denied, say so plainly
      and suggest an allowed alternative.
    - Be concise: show the command you ran and its output.
