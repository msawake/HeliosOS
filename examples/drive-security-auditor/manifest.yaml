apiVersion: forgeos/v1
kind: Agent
metadata:
  name: drive-security-auditor
  description: >-
    Daily read-only audit of Google Drive sharing — flags files shared
    publicly, by link, or domain-wide, with their permissions. Runs
    gemini-2.5-pro, lists risky shares via the drive__audit_sharing tool
    (Drive API, metadata only), classifies risk, and emails the report to
    the operator. No write/share capability.
  department: operations
  labels:
    category: security-audit
    execution: scheduled
    scope: google-drive
    model: gemini-2.5-pro
spec:
  stack: forgeos
  execution_type: scheduled
  ownership: shared
  schedule: "0 7 * * *"   # 07:00 UTC daily
  llm:
    chat_model: gemini-2.5-pro
    provider: google
  tools:
    - drive__audit_sharing   # Drive API: list public/domain-shared files (read-only)
    - notify__email          # email the report
    - human__notify
    - memory__read
    - memory__write
  system_prompt:
    file: system_prompt.md
  metadata:
    report_to: "antoni.bergas@makingscience.com"
    memory_key_prefix: "drive-audit/"
