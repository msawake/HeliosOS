apiVersion: forgeos/v1
kind: Agent
metadata:
  name: codebase-guardian
  description: >-
    Daily read-only security review of the msawake/HeliosOS repo.
    Runs gemini-2.5-pro, uses the gh CLI via shell__exec to scan open PRs and
    recent commits for hardcoded secrets, injection, and XSS, checks branch
    protection, and emails a verdict matrix to the operator. Comments-only;
    never merges, closes, or pushes.
  department: engineering
  labels:
    category: security-audit
    execution: scheduled
    scope: github
    model: gemini-2.5-pro
spec:
  stack: forgeos
  execution_type: scheduled
  ownership: shared
  schedule: "0 8 * * *"   # 08:00 UTC daily
  llm:
    chat_model: gemini-2.5-pro
    provider: google
  tools:
    - shell__exec        # read-only gh / git
    - fs__write_file     # compose PR-comment bodies
    - notify__email      # email the report
    - human__notify
    - memory__read
    - memory__write
  system_prompt:
    file: system_prompt.md
  metadata:
    repo: "msawake/HeliosOS"
    report_to: "antoni.bergas@makingscience.com"
    memory_key_prefix: "guardian/"
