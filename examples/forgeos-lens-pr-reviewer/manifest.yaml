apiVersion: forgeos/v1
kind: Agent
metadata:
  name: forgeos-lens-pr-reviewer
  description: >-
    Reviews open PRs on antonibergas-hue/forgeos-lens every 5 minutes.
    Uses Nemotron-3-Super (via opencode) to produce a structured review,
    posts inline + summary comments via gh. Dedupes by head SHA: each PR
    is only reviewed once per push.
  department: operations
  labels:
    category: code-review
    execution: scheduled
    model: nemotron-3-super
spec:
  stack: forgeos
  execution_type: scheduled
  ownership: shared
  schedule: "*/5 * * * *"
  llm:
    chat_model: nvidia/nemotron-3-super
    provider: vllm
    metadata:
      base_url: "http://34.78.73.30:8080/v1"
  tools:
    - shell__exec
    - code__opencode_run
    - memory__read
    - memory__write
    - human__notify
    # A2A: reviewer can be invoked by the orchestrator and can discover peers.
    - agent__list_available
  system_prompt:
    file: system_prompt.md
  metadata:
    repo: "antonibergas-hue/forgeos-lens"
    review_workdir: "/tmp/forgeos-lens-builder/forgeos-lens"
    memory_key_prefix: "pr-reviewed/"
