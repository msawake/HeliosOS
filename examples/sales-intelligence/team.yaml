apiVersion: forgeos/v1
kind: Team
metadata:
  name: sales-intelligence
  namespace: sales
  description: "Enterprise Sales Intelligence Platform — 6 agents, 3 frameworks, 5 models"
spec:
  defaults:
    boundaries:
      budgets:
        daily_usd: 5.00
  orchestration: supervisor
  agents:
    - name: market-monitor
      role: worker
      stack: adk
      execution_type: always_on
      llm:
        chat_model: gemini-2.0-flash
        provider: google
      tools:
        - google_search
        - company__publish_event
        - agent__call
      boundaries:
        budgets:
          daily_usd: 3.00
      system_prompt: |
        You are a market intelligence monitor. Continuously scan for:
        - Competitor announcements, funding rounds, product launches
        - Industry trends relevant to our ICP
        - Regulatory changes affecting our market
        When you detect significant changes, alert the team via company__publish_event
        and notify the on-call human for critical market shifts.
      metadata:
        loop_interval_seconds: 300

    - name: research-analyst
      role: worker
      stack: anthropic-agent-sdk
      execution_type: autonomous
      llm:
        chat_model: claude-opus-4-6
        provider: anthropic
      tools:
        - company__search_knowledge
        - knowledge__search
        - knowledge__deep_load
        - company__record_metric
      boundaries:
        budgets:
          daily_usd: 10.00
          per_task_usd: 2.00
        data:
          allowed_namespaces: [sales, marketing]
          blocked_namespaces: [hr]
          pii_policy: mask
      governance:
        audit_level: full
      system_prompt: |
        You are a deep research analyst. For each research request:
        1. Plan your research phases
        2. Execute each phase, saving checkpoints between phases
        3. Check for signals between phases (you may be redirected)
        4. Reserve budget before expensive analysis
        5. If you need financial data, request a capability token
        Produce thorough, cited research reports.
      metadata:
        max_iterations: 20
        loop_interval_seconds: 60

    - name: lead-qualifier
      role: worker
      stack: forgeos
      execution_type: reflex
      llm:
        chat_model: claude-sonnet-4-5-20250514
        provider: anthropic
      tools:
        - platform__crm_search_leads
        - company__search_knowledge
        - agent__call
        - agent__async_call
      boundaries:
        budgets:
          daily_usd: 5.00
        data:
          allowed_namespaces: [sales, marketing]
          blocked_namespaces: [finance, hr]
          pii_policy: detect
      system_prompt: |
        You are a lead qualifier using the BANT framework.
        For each lead:
        1. Call market-monitor for relevant market context
        2. Score: Budget, Authority, Need, Timeline (0-100)
        3. If score 60-70 (borderline), request deep research via async call to research-analyst
        4. If score >= 70, classify as SQL
        5. Record score as metric

    - name: outreach-composer
      role: worker
      stack: forgeos
      execution_type: reflex
      llm:
        chat_model: gpt-4o
        provider: openai
      tools:
        - company__search_knowledge
        - company__request_approval
        - company__record_metric
      capabilities:
        tools:
          allowed:
            - company__search_knowledge
            - company__request_approval
            - company__record_metric
          denied:
            - company__send_email
            - platform__crm_delete_*
      boundaries:
        budgets:
          daily_usd: 3.00
        data:
          allowed_namespaces: [sales, marketing]
          pii_policy: mask
      governance:
        policies:
          - name: email_daily_limit
        human_in_loop:
          - event: email.compose
            approvers: [sales-lead]
            sla_hours: 4
        audit_level: full
      system_prompt: |
        You are an outreach composer. Write personalized emails based on research.
        IMPORTANT:
        - You CANNOT send emails directly (send_email is denied)
        - Every email must be approved by the sales lead via ask_human()
        - Check your contract to see remaining daily email quota
        - Comply with CAN-SPAM: include unsubscribe, physical address

    - name: pipeline-analyst
      role: worker
      stack: adk
      execution_type: scheduled
      schedule: "0 8 * * 1-5"
      llm:
        chat_model: gemini-2.5-pro
        provider: google
      tools:
        - platform__crm_search_leads
        - company__record_metric
        - agent__call
      boundaries:
        budgets:
          daily_usd: 2.00
      system_prompt: |
        You are a pipeline analyst. Every morning (M-F 8am):
        1. Query CRM for pipeline status
        2. Call lead-qualifier for recent scoring data
        3. Generate pipeline forecast with trends
        4. Create visualization of deal stages
        5. Record key metrics
        Produce a concise morning brief for the sales team.

    - name: sales-manager
      role: supervisor
      stack: anthropic-agent-sdk
      execution_type: reflex
      llm:
        chat_model: claude-opus-4-6
        provider: anthropic
      tools:
        - agent__call
        - agent__async_call
        - agent__await
        - agent__list_available
        - company__search_knowledge
        - company__publish_event
        - company__request_approval
      boundaries:
        budgets:
          daily_usd: 15.00
      system_prompt: |
        You are the sales team manager. You coordinate:
        - market-monitor: continuous market intelligence
        - research-analyst: deep research on opportunities
        - lead-qualifier: BANT scoring
        - outreach-composer: email crafting
        - pipeline-analyst: daily pipeline analysis
        Decision authority:
        - Deals <$1K: auto-approve
        - $1K-$5K: notify sales-lead
        - $5K-$10K: request sales-lead approval via ask_human
        - >$10K: request board approval via ask_human
        You can:
        - Grant research-analyst temporary access to finance data (capability tokens)
        - Stop research-analyst mid-task if priorities change (signal SIGTERM)
        - Escalate critical issues to on-call human

  shared_context:
    namespace: sales
    shared_tools:
      - company__publish_event
      - company__record_metric
