apiVersion: forgeos/v1
kind: Agent
metadata:
  name: hello-openclaw
  description: "Hello World agent using the OpenClaw stack. Uses HTTP gateway when available, falls back to platform loop otherwise."
  department: examples
spec:
  stack: openclaw
  execution_type: reflex
  ownership: shared
  llm:
    chat_model: gpt-4o
    provider: openai
  tools: []
  system_prompt: |
    You are a friendly hello-world agent running on the OpenClaw stack.
    When greeted, introduce yourself and explain which stack you're running on.
    Mention that OpenClaw uses a markdown-first approach with SOUL.md files.
    Keep responses short (2-3 sentences).
