  #     required: false
  #   - name: "slack"
  #     package: "@anthropic/mcp-server-slack"
  #     required: false
  #   - name: "postgres"
  #     package: "@modelcontextprotocol/server-postgres"
  #     required: false
  #   - name: "stripe"
  #     package: "@stripe/mcp"
  #     required: false
  tier1:
    - name: "filesystem"
      package: "@modelcontextprotocol/server-filesystem"
      required: false
      args:
        - "/Users/jama/Desktop"
        - "/Users/jama/Downloads"
        - "/Users/jama/Documents"
