company:
  name: "TravelForge AI"
  domain: "travelforge.ai"
  mission: "Search everywhere, book directly, skip the middleman. Find flights, hotels, cars, and activities at the best prices without OTA markups."

budgets:
  daily_token_budget: 8_000_000
  critical_reserve_pct: 10
  per_session_cost_limit_usd: 30.00
  monthly_infrastructure_budget_usd: 5000

  department_daily_tokens:
    search: 3_000_000
    booking: 2_000_000
    support: 1_000_000
    marketing: 1_000_000
    finance: 300_000
    compliance: 400_000
    executive: 300_000

agent_defaults:
  max_retries: 3
  stale_task_threshold_minutes: 30
  checkpoint_interval_minutes: 5
  review_sample_rate: 0.10
  canary_duration_hours: 12

rate_limits:
  max_tool_calls_per_session: 150
  max_api_calls_per_minute: 40
  max_concurrent_agents_per_type: 12

hitl:
  booking_confirmation_sla_hours: 1
  refund_sla_hours: 24
  dispute_sla_hours: 24
  price_guarantee_sla_hours: 4
  ad_spend_sla_hours: 12
  content_approval_sla_hours: 4

  default_denials:
    account_suspension: true
    refund_over_100: true

models:
  orchestrator_default: "claude-haiku-4-5-20251001"
  doer_default: "claude-haiku-4-5-20251001"
  classifier_default: "claude-haiku-4-5-20251001"

polling_intervals:
  search_cycle_minutes: 2
  price_monitor_cycle_minutes: 5
  alert_cycle_minutes: 1
  executive_cycle_minutes: 30
  monitoring_cycle_minutes: 2

mcp_servers:
  tier1:
    - name: "google-workspace"
      package: "google-workspace-mcp"
      required: true
    - name: "slack"
      package: "@anthropic/mcp-server-slack"
      required: true
    - name: "postgres"
      package: "@modelcontextprotocol/server-postgres"
      required: true
    - name: "stripe"
      package: "@stripe/mcp"
      required: true
  tier2:
    - name: "analytics"
      package: "analytics-mcp"
      required: false
