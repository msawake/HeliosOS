company:
  name: "DealForge AI"
  domain: "dealforge.ai"
  mission: "Your AI deal-finder across all marketplaces. Search Craigslist, Facebook Marketplace, OfferUp, and eBay from one place."

budgets:
  daily_token_budget: 5_000_000
  critical_reserve_pct: 10
  per_session_cost_limit_usd: 25.00
  monthly_infrastructure_budget_usd: 3000

  department_daily_tokens:
    search: 2_000_000
    deals: 1_500_000
    marketing: 800_000
    finance: 200_000
    support: 500_000

agent_defaults:
  max_retries: 3
  stale_task_threshold_minutes: 30
  checkpoint_interval_minutes: 5
  review_sample_rate: 0.10
  canary_duration_hours: 12

rate_limits:
  max_tool_calls_per_session: 100
  max_api_calls_per_minute: 30
  max_concurrent_agents_per_type: 10

hitl:
  purchase_confirmation_sla_hours: 4
  fraud_review_sla_hours: 2
  dispute_sla_hours: 24
  refund_sla_hours: 24
  content_approval_sla_hours: 4

  default_denials:
    account_suspension: true
    refund_over_50: true

models:
  orchestrator_default: "claude-haiku-4-5-20251001"
  doer_default: "claude-haiku-4-5-20251001"
  classifier_default: "claude-haiku-4-5-20251001"

polling_intervals:
  crawler_cycle_minutes: 5
  deal_matching_cycle_minutes: 2
  alert_cycle_minutes: 1
  executive_cycle_minutes: 30
  monitoring_cycle_minutes: 2

mcp_servers:
  tier1:
    - name: "google-workspace"
      package: "google-workspace-mcp"
      required: true
    - name: "slack"
      package: "@anthropic/mcp-server-slack"
      required: true
    - name: "postgres"
      package: "@modelcontextprotocol/server-postgres"
      required: true
    - name: "stripe"
      package: "@stripe/mcp"
      required: true
  tier2:
    - name: "analytics"
      package: "analytics-mcp"
      required: false
