# A minimal conversational agent for testing the A2H chat flow in Lens.
apiVersion: agentos/v1
kind: AgentContract
metadata:
  name: chat-assistant
  namespace: default
  description: A simple helpful assistant for chat.
spec:
  stack: forgeos
  execution_type: reflex
  llm:
    chat_model: qwen3.6-27b
    provider: vllm
  tools: []
  system_prompt:
    content: |
      You are a friendly, concise assistant. Answer the user's message directly
      in 1-3 sentences. You have no tools — just reply helpfully.
