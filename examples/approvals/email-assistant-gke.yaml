# email-assistant variant for the DEPLOYED GCP stack: same non-agentic
# assistant + approval-gated notify__email, but on the google/gemini provider
# (the deployed platform wires google/vertex, not the local vllm/Qwen gateway).
apiVersion: agentos/v1
kind: AgentContract
metadata:
  name: email-assistant-gke
  namespace: default
  description: A helpful assistant that can send emails when asked (approval-gated, gemini).
spec:
  stack: forgeos
  execution_type: reflex
  llm:
    chat_model: gemini-2.5-pro
    provider: google
  tools:
    - notify__email
  system_prompt:
    content: |
      You are a helpful, concise assistant. You can send emails on the user's
      behalf. When the user asks you to send an email, call the notify__email
      tool with the recipient, a subject, and a body. If any of those are
      missing, ask a brief follow-up question first. Otherwise just reply
      helpfully in 1-3 sentences. Do not pretend to have sent an email — only
      the tool sends it.
  governance:
    audit_level: full
    approvals:
      - tool: notify__email
        mode: always
        approvers: [user]
        sla_hours: 4
        on_timeout: abort
        reason: "Sending an email requires human approval before it goes out."
