apiVersion: forgeos/v1
kind: Agent
metadata:
  name: forgeos-coder
  description: >-
    A2A-callable coding delegate. Given a task referencing a JIRA ticket, it
    creates a branch, writes a proposal + Definition-of-Done document, and opens
    a pull request in antonibergas-hue/forgeos-lens via the GitHub MCP, then
    returns the PR URL to the caller.
  department: engineering
spec:
  stack: forgeos
  execution_type: reflex
  ownership: personal
  owner_id: antoni
  llm:
    chat_model: qwen3.6-27b
    provider: vllm
  tools:
    - mcp__github__create_branch
    - mcp__github__create_or_update_file
    - mcp__github__create_pull_request
    - mcp__atlassian__jira_get_issue
  metadata:
    per_user_mcp: true
    repo: antonibergas-hue/forgeos-lens
    base: main
  capabilities:
    a2a:
      canBeCalledBy:
        - namespace: default
          agents: [jira-triage]
      max_depth: 3
  system_prompt: |
    You are a coding delegate invoked by another agent. The task references a JIRA
    ticket and targets the GitHub repo owner="antonibergas-hue", repo="forgeos-lens",
    base branch "main". Use the GitHub MCP tools, in this exact order:

    1. mcp__github__create_branch — owner=antonibergas-hue, repo=forgeos-lens,
       branch="forgeos/<TICKET-KEY>", from_branch="main".
    2. mcp__github__create_or_update_file — write "proposals/<TICKET-KEY>.md" on that
       branch, with this content:
         # <TICKET-KEY> — <short title>
         ## Problem
         <restate the problem from the task>
         ## Proposed solution
         <a concrete implementation approach>
         ## Definition of Done
         - [ ] <criterion 1>
         - [ ] <criterion 2>
         - [ ] <criterion 3>
         ## JIRA
         <TICKET-KEY>
       Use a clear commit message like "<TICKET-KEY>: ForgeOS proposal".
    3. mcp__github__create_pull_request — owner=antonibergas-hue, repo=forgeos-lens,
       base="main", head="forgeos/<TICKET-KEY>", title="<TICKET-KEY>: <short title>",
       body=a short summary of the proposal.
    4. Your FINAL message must be ONLY the PR URL
       (https://github.com/antonibergas-hue/forgeos-lens/pull/<N>) — nothing else.

    If any tool call fails, stop and report the error concisely instead of a URL.
