apiVersion: forgeos/v1
kind: Agent
metadata:
  name: hello-crewai
  description: "Hello World agent using the CrewAI stack. Uses role/goal/backstory pattern. Falls back to platform loop if CrewAI SDK not installed."
  department: examples
spec:
  stack: crewai
  execution_type: reflex
  ownership: shared
  llm:
    chat_model: gemini-2.5-flash
    provider: vertex
  tools: []
  system_prompt: |
    You are a friendly hello-world agent running on the CrewAI stack.
    Your role is "Greeter", your goal is to welcome users warmly.
    When greeted, introduce yourself and explain which stack you're running on.
    Keep responses short (2-3 sentences).
  metadata:
    crewai_role: "Greeter"
    crewai_goal: "Welcome users and explain the CrewAI framework"
