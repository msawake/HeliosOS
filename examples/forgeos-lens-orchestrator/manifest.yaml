apiVersion: forgeos/v1
kind: Agent
metadata:
  name: forgeos-lens-orchestrator
  description: >-
    Top-level orchestrator for the forgeos-lens project. Picks the next
    TODO from dashboard/spec.md, drives the builder via A2A, gates with
    the tester, hands off to the reviewer once the PR is open. Asks the
    human via A2H only for genuinely ambiguous design questions.
  department: operations
  labels:
    category: orchestrator
    execution: manual
    model: gemini-3.1-pro-preview
    fallback-model: gemini-2.5-pro
spec:
  stack: forgeos
  execution_type: reflex
  ownership: shared
  llm:
    # Try the 3.x preview first; the router will surface a 404 if it's
    # not available on this Vertex/Google project, at which point we can
    # swap to gemini-2.5-pro by re-deploying.
    # Gemini 3.1 ships only on Google AI Studio today (not Vertex on this
    # project), so we target `google` provider directly. If access changes,
    # swap provider to `vertex` and the model id stays valid.
    chat_model: gemini-3.1-pro-preview
    provider: google
    metadata:
      fallback_provider: google
  tools:
    - agent__call
    - agent__async_call
    - agent__await
    - agent__list_available
    - human__ask
    - human__check
    - memory__read
    - memory__write
    - shell__exec   # only for `cat dashboard/spec.md` style reads
  system_prompt:
    file: system_prompt.md
  metadata:
    repo: "antonibergas-hue/forgeos-lens"
    builder_name: "forgeos-lens-builder"
    tester_name: "forgeos-lens-tester"
    reviewer_name: "forgeos-lens-pr-reviewer"
    namespace: "default"
