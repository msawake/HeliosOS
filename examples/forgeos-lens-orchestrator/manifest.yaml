apiVersion: forgeos/v1
kind: Agent
metadata:
  name: forgeos-lens-orchestrator
  description: >-
    Top-level orchestrator for the forgeos-lens project. Picks the next
    TODO from dashboard/spec.md, drives the builder via A2A, gates with
    the tester, forces a review, applies final fixes for review concerns,
    then accepts and merges the PR — looping through multiple TODOs per run.
    Asks the human via A2H only for genuinely ambiguous design questions.
  department: operations
  labels:
    category: orchestrator
    execution: manual
    # gemini-3.1-pro-preview is reachable but requires `thought_signature`
    # echo on multi-turn tool use, which the platform's google client doesn't
    # propagate yet. Tracked as a follow-up. Using 2.5-pro for now.
    model: gemini-2.5-pro
    todo-future-model: gemini-3.1-pro-preview
spec:
  stack: forgeos
  execution_type: reflex
  ownership: shared
  llm:
    # Try the 3.x preview first; the router will surface a 404 if it's
    # not available on this Vertex/Google project, at which point we can
    # swap to gemini-2.5-pro by re-deploying.
    chat_model: gemini-2.5-pro
    provider: google
    metadata:
      fallback_provider: google
  tools:
    - agent__call
    - agent__async_call
    - agent__await
    - agent__list_available
    - human__ask
    - human__check
    - memory__read
    - memory__write
    - shell__exec      # read spec, `gh pr view/checks`, and `gh pr merge`
    - fs__write_file   # apply trivial final fixes for review concerns
    - git__commit_push # push those final fixes to the PR branch
  system_prompt:
    file: system_prompt.md
  metadata:
    repo: "antonibergas-hue/forgeos-lens"
    builder_name: "forgeos-lens-builder"
    tester_name: "forgeos-lens-tester"
    reviewer_name: "forgeos-lens-pr-reviewer"
    namespace: "default"
