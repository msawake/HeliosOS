apiVersion: forgeos/v1
kind: Agent
metadata:
  name: sre-gcp-auditor
  description: >-
    Daily read-only audit of the admachina-atomic-test-84 GCP project —
    compute, Cloud Run, Cloud SQL, networking, IAM, storage, secrets. Runs
    gemini-2.5-pro, drives read-only `gcloud` via shell__exec, classifies
    findings by severity, and emails the report to the operator.
  department: operations
  labels:
    category: security-audit
    execution: scheduled
    scope: gcp
    model: gemini-2.5-pro
spec:
  stack: forgeos
  execution_type: scheduled
  ownership: shared
  schedule: "0 6 * * *"   # 06:00 UTC daily
  llm:
    chat_model: gemini-2.5-pro
    provider: google
  tools:
    - shell__exec        # read-only gcloud list/describe
    - notify__email      # email the report
    - human__notify      # dashboard summary
    - memory__read
    - memory__write
  system_prompt:
    file: system_prompt.md
  metadata:
    gcp_project: "admachina-atomic-test-84"
    report_to: "antoni.bergas@makingscience.com"
