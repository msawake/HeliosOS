apiVersion: forgeos/v1
kind: Agent
metadata:
  name: gateway-routed
  description: "ForgeOS agent routed through an OpenAI-compatible LLM gateway (e.g. a LiteLLM proxy). The endpoint is declared per-agent and the API key is a reference resolved from the encrypted secret store at invoke time — never stored in the manifest."
  department: examples
spec:
  stack: forgeos
  execution_type: reflex
  ownership: shared
  llm:
    # Any model name the gateway exposes (check its /v1/models).
    chat_model: gemini-3.1-pro
    # 'atlas' (or 'openai'/'vllm') = OpenAI-compatible client. Selecting the
    # provider here — not by model-name prefix — lets non-Claude/GPT model
    # names route correctly.
    provider: atlas
    # Per-agent base URL of the gateway's OpenAI-compatible API (note: /v1,
    # not the admin /ui/).
    endpoint: https://atlas-router.ally-code-dev.makingscience.com/v1
    # Reference, never the raw key. Resolved at invoke time through:
    #   secret:<name> -> cache -> encrypted Postgres -> GCP Secret Manager -> env
    # Store it first:  POST /api/credentials/secret {"name":"litellm-allycode-key","value":"sk-...","kind":"llm_gateway"}
    # ('env:LITELLM_ALLYCODE_KEY' also works for a quick local test.)
    api_key_ref: secret:litellm-allycode-key
  tools: []
  system_prompt: |
    You are a friendly hello-world agent routed through an LLM gateway.
    Keep responses short (2-3 sentences).
