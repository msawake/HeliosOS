# ============================================================================
# Helios OS Example: Autonomous Agent — Trend Researcher
# ============================================================================
#
# EXECUTION TYPE: autonomous
#   An autonomous agent is goal-driven. You give it a goal and it works toward
#   it iteratively — planning, executing, and evaluating its own progress in
#   a loop. Each iteration it decides what to do next based on what it has
#   already accomplished. It stops when it determines the goal is complete
#   (by outputting [GOAL_COMPLETE]) or when max_iterations is reached.
#
# WHEN IT RUNS:
#   Once, when deployed or manually invoked. It then loops autonomously
#   (up to max_iterations times, with loop_interval_seconds between each
#   iteration) until it finishes or hits the iteration cap.
#
# DEPLOY:
#   forgeos deploy examples/forgeos/autonomous-researcher.yaml
#
# TEST:
#   # Start the agent (it will begin working toward its goal immediately):
#   curl -X POST http://localhost:5001/api/agents/trend-researcher/invoke \
#     -H "Content-Type: application/json" \
#     -d '{"prompt": "Begin your research."}'
#
#   # Monitor progress across iterations:
#   curl http://localhost:5001/api/agents/trend-researcher/history?limit=10
#
#   # Check current status (running / completed):
#   curl http://localhost:5001/api/agents/trend-researcher/status
#
# ============================================================================

apiVersion: forgeos/v1
kind: Agent
metadata:
  name: trend-researcher
  description: "Autonomous agent that iteratively researches AI agent framework trends, builds up findings over multiple iterations, and produces a final summary."
  department: examples
spec:
  stack: forgeos
  execution_type: autonomous
  ownership: shared
  goal: "Research the top 5 trends in AI agent frameworks and write a 500-word summary"
  llm:
    chat_model: gemini-2.5-flash
    provider: vertex
  tools:
    - company__search_knowledge
    - company__add_decision
  metadata:
    max_iterations: 10
    loop_interval_seconds: 5
  system_prompt: |
    You are an autonomous research agent. You have a goal to achieve and you will
    work toward it iteratively. Each iteration, you decide what to do next.

    YOUR GOAL:
    Research the top 5 trends in AI agent frameworks and write a 500-word summary.

    STRATEGY — follow these phases across your iterations:

    Phase 1 — Discovery (iterations 1-3):
      - Use search_knowledge to find information about AI agent frameworks.
      - Search for different angles: "multi-agent systems", "agent orchestration",
        "tool-use agents", "autonomous AI agents", "agent frameworks 2025-2026".
      - Take notes on what you find.

    Phase 2 — Analysis (iterations 4-6):
      - Review your accumulated findings.
      - Identify the top 5 most significant trends.
      - Use add_decision to record each trend with supporting evidence.

    Phase 3 — Synthesis (iterations 7-8):
      - Write a cohesive 500-word summary covering all 5 trends.
      - Use add_decision to record the final summary.

    Phase 4 — Completion:
      - Review the summary for quality and completeness.
      - When satisfied, output [GOAL_COMPLETE] to signal you are done.

    RULES:
    - Each iteration should make meaningful progress — do not repeat work.
    - If search_knowledge returns no results for a query, try different terms.
    - You MUST output [GOAL_COMPLETE] when the goal is achieved. If you reach
      iteration 9 without completing, wrap up with whatever you have.
