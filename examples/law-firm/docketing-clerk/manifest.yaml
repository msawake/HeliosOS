apiVersion: forgeos/v1
kind: Agent
metadata:
  name: docketing-clerk
  namespace: default
  description: >-
    The firm's docketing clerk. Runs daily, reads the master "Docket &
    Deadlines" sheet from Drive, and surfaces deadlines that are approaching or
    missed — court filings, discovery cut-offs, statute-of-limitations dates.
    It escalates the at-risk items to the responsible attorney (email when
    Gmail is configured, always a dashboard notice). Read-only on the docket;
    it never moves a date, only warns about it.
  department: legal
  labels:
    category: docketing
    execution: scheduled
    model: qwen3.6-27b
spec:
  stack: forgeos
  execution_type: scheduled
  ownership: shared
  schedule: "0 8 * * 1-5"     # 08:00 UTC on weekdays
  llm:
    chat_model: qwen3.6-27b
    provider: vllm           # OpenAI-compatible atlas-router gateway (OPENAI_BASE_URL/OPENAI_API_KEY at boot)
  tools:
    - drive__find_by_name
    - drive__list_files
    - drive__read_file
    - notify__email              # email the responsible attorney (needs FORGEOS_GWS_* creds)
    - company__request_approval  # raise a MISSED/URGENT deadline to the Approvals queue
    - memory__read
    - memory__write
  system_prompt:
    file: system_prompt.md
  metadata:
    drive_agent_sa: "forgeos-drive-agent@admachina-atomic-test-84.iam.gserviceaccount.com"
    firm_root_folder_id: ""
    # How many days out counts as "approaching".
    horizon_days: "14"
    report_to: "antoni.bergas@makingscience.com"
