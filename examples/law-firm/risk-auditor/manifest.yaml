apiVersion: forgeos/v1
kind: Agent
metadata:
  name: risk-compliance-auditor
  namespace: default
  description: >-
    The firm's risk & compliance auditor. Runs daily, read-only, and flags
    confidentiality failures in the firm's Google Drive — privileged or
    client-confidential documents shared by public link or whole-domain. In a
    law firm an over-shared privileged memo is an attorney-client privilege
    waiver and a malpractice exposure, so a CRITICAL finding pages a partner.
    Uses drive__audit_sharing (Drive metadata only — it cannot read contents),
    classifies risk, diffs against yesterday, and emails the managing partner.
    No authority to change sharing — it only reports.
  department: legal
  labels:
    category: risk-compliance
    execution: scheduled
    model: qwen3.6-27b
spec:
  stack: forgeos
  execution_type: scheduled
  ownership: shared
  schedule: "0 7 * * *"       # 07:00 UTC daily
  llm:
    chat_model: qwen3.6-27b
    provider: vllm           # OpenAI-compatible atlas-router gateway (OPENAI_BASE_URL/OPENAI_API_KEY at boot)
  tools:
    - drive__audit_sharing       # Drive API: list public/domain-shared files (read-only, metadata only; needs FORGEOS_GWS_* OAuth)
    - drive__list_files          # SA path: list shared matter files (content-based compliance pass)
    - drive__read_file           # SA path: read a doc to flag PRIVILEGED/confidential markers
    - notify__email              # email the managing partner (needs FORGEOS_GWS_* creds)
    - company__request_approval  # escalate a CRITICAL privilege exposure → dashboard Approvals queue
    - memory__read
    - memory__write
  system_prompt:
    file: system_prompt.md
  # Daily spend ceiling — the auditor must never run away.
  guardrails:
    max_cost_usd_per_day: 5.0
    max_tokens_per_run: 120000
  governance:
    audit_level: full         # every finding is recorded in the hash-chained audit log
    # Per-tool human approval (runtime-v2): emailing the managing partner about
    # a privilege exposure is kernel-gated. The auditor calls notify__email
    # normally; the kernel returns ask_human, the run suspends durably, and it
    # resumes (sending once) only after the partner approves. forgeos stack is
    # suspendable, so this is honoured as true human-in-the-loop.
    approvals:
      - tool: notify__email
        mode: always
        approvers: [managing-partner]
        sla_hours: 4
        on_timeout: abort
        reason: "Partner notification about a privilege exposure must be reviewed before sending."
  metadata:
    report_to: "antoni.bergas@makingscience.com"
    memory_key_prefix: "risk-audit/"
    # The privilege scan reads each matter document individually (one
    # drive__read_file per file), so the default 6-turn budget is exhausted
    # before synthesis. Give it room to list → read several docs → audit → report.
    max_turns: 18
    # Document-name patterns that imply privilege/confidentiality (raise severity).
    privileged_patterns: "privileged,attorney-client,work product,confidential,settlement,NDA,engagement letter,retainer,deposition,memo"
