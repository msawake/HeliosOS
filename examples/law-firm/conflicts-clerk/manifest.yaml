apiVersion: forgeos/v1
kind: Agent
metadata:
  name: conflicts-clerk
  namespace: conflicts        # its own namespace — the ethical wall
  description: >-
    The firm's conflicts-of-interest clerk. Given a prospective client and the
    adverse parties, it checks the firm's master client/matter list and returns
    a structured verdict (clear / conflict / needs_review). It lives behind an
    ethical wall: only the Associate may call it (A2A canBeCalledBy ACL), and it
    has no authority to draft, send, or open matters — it only reads the client
    list and renders a determination.
  department: legal
  labels:
    category: conflicts
    execution: reflex
    model: qwen3.6-27b
spec:
  stack: forgeos
  execution_type: reflex
  ownership: shared
  llm:
    chat_model: qwen3.6-27b
    provider: vllm           # OpenAI-compatible atlas-router gateway (OPENAI_BASE_URL/OPENAI_API_KEY at boot)
  tools:
    - drive__find_by_name
    - drive__list_files
    - drive__read_file
    - memory__read
    - memory__write
  system_prompt:
    file: system_prompt.md
  # The ethical wall, expressed as an A2A ACL: only the Associate (in the
  # default namespace) may call this clerk. Any other caller is denied by the
  # A2A layer before this agent ever runs.
  capabilities:
    a2a:
      canBeCalledBy:
        - namespace: default
          agents:
            - law-firm-associate
      max_depth: 3
  metadata:
    drive_agent_sa: "forgeos-drive-agent@admachina-atomic-test-84.iam.gserviceaccount.com"
    firm_root_folder_id: ""
