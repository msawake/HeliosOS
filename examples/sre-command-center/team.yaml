apiVersion: forgeos/v1
kind: Team
metadata:
  name: sre-command-center
  namespace: sre
  description: "SRE Command Center — incident response, code review, deployment governance"
spec:
  defaults:
    boundaries:
      budgets:
        daily_usd: 5.00

  orchestration: supervisor

  agents:
    - name: alert-sentinel
      role: worker
      stack: adk
      execution_type: always_on
      llm:
        chat_model: gemini-2.0-flash
        provider: google
      tools:
        - platform__query_alerts
        - company__publish_event
        - agent__call
      boundaries:
        budgets:
          daily_usd: 2.00
      system_prompt: |
        You are the Alert Sentinel. Continuously monitor alerts from Datadog/PagerDuty.
        Classify severity: P0 (critical), P1 (high), P2 (medium), P3 (low), P4 (info).
        Actions:
        - P0/P1: immediately notify on-call engineer, fire A2A to incident-analyst
        - P2: fire A2A to incident-analyst (no human notification)
        - P3/P4: log and aggregate for daily report
      metadata:
        loop_interval_seconds: 30

    - name: incident-analyst
      role: worker
      stack: anthropic-agent-sdk
      execution_type: autonomous
      llm:
        chat_model: claude-opus-4-6
        provider: anthropic
      tools:
        - platform__query_logs
        - platform__query_metrics
        - platform__query_traces
        - company__search_knowledge
        - company__record_metric
      boundaries:
        budgets:
          daily_usd: 10.00
          per_task_usd: 2.00
        data:
          allowed_namespaces: [sre, observability]
          blocked_namespaces: [customer-data, billing]
          pii_policy: redact
      governance:
        audit_level: full
      system_prompt: |
        You are the Incident Analyst. For each incident:
        1. Plan investigation phases (logs -> metrics -> traces -> hypothesis)
        2. Save checkpoint after each phase (crash recovery)
        3. Check for signals between phases (may be redirected to higher-priority incident)
        4. Reserve budget before expensive Opus analysis
        5. If you need production logs, request a capability token from SRE Lead
        6. Produce a root cause analysis with evidence
        Never access customer data directly. Use redacted views only.
      metadata:
        max_iterations: 30
        loop_interval_seconds: 45

    - name: remediation-agent
      role: worker
      stack: forgeos
      execution_type: reflex
      llm:
        chat_model: claude-sonnet-4-5-20250514
        provider: anthropic
      tools:
        - platform__kubectl_restart
        - platform__kubectl_scale
        - platform__toggle_feature_flag
        - platform__rollback_deployment
        - company__record_metric
      capabilities:
        tools:
          allowed:
            - platform__kubectl_restart
            - platform__kubectl_scale
            - platform__toggle_feature_flag
            - platform__rollback_deployment
            - company__record_metric
          denied:
            - platform__kubectl_delete
            - platform__drop_table
            - platform__rm_rf
            - platform__kubectl_exec
      boundaries:
        budgets:
          daily_usd: 3.00
        data:
          allowed_namespaces: [sre, infrastructure]
          pii_policy: block
      governance:
        policies:
          - name: max_remediation_actions
        human_in_loop:
          - event: remediation.execute
            approvers: [on-call-engineer]
            sla_hours: 0.5
        audit_level: full
      system_prompt: |
        You are the Remediation Agent. You execute infrastructure fixes.
        CRITICAL SAFETY RULES:
        - kubectl_delete is DENIED. You cannot delete namespaces, pods, or deployments.
        - DROP_TABLE is DENIED. You cannot modify databases directly.
        - rm -rf is DENIED. You cannot delete files on servers.
        - Every remediation action requires on-call engineer approval via ask_human()
        - Maximum 3 remediation actions per incident (check your contract)
        - Always check your contract before attempting an action
        Available safe actions: restart, scale, feature_flag, rollback

    - name: code-reviewer
      role: worker
      stack: forgeos
      execution_type: event_driven
      event_triggers:
        - pr.opened
        - pr.updated
      llm:
        chat_model: gpt-4o
        provider: openai
      tools:
        - platform__read_pr_diff
        - platform__read_file
        - platform__post_review_comment
        - agent__call
      boundaries:
        budgets:
          daily_usd: 4.00
        data:
          allowed_namespaces: [sre, code]
          blocked_namespaces: [infrastructure, customer-data]
          pii_policy: detect
      system_prompt: |
        You are the Code Reviewer. When a PR is opened or updated:
        1. Read the diff and understand the changes
        2. Check for security vulnerabilities (SQL injection, XSS, SSRF)
        3. Check for performance issues (N+1 queries, missing indexes)
        4. Check for best practices (error handling, logging, tests)
        5. Call deploy-guardian to assess deployment impact
        6. Post review comments with specific line references

    - name: deploy-guardian
      role: worker
      stack: adk
      execution_type: reflex
      llm:
        chat_model: gemini-2.5-pro
        provider: google
      tools:
        - platform__run_tests
        - platform__check_resources
        - platform__validate_config
        - platform__deploy_to_staging
        - agent__call
      boundaries:
        budgets:
          daily_usd: 3.00
      governance:
        policies:
          - name: no_deploy_during_incident
        human_in_loop:
          - event: deploy.production
            approvers: [tech-lead]
            sla_hours: 2
        audit_level: full
      system_prompt: |
        You are the Deploy Guardian. Pre-deployment validation:
        1. Run test suite (must pass 100%)
        2. Check resource usage (CPU, memory, disk)
        3. Validate configuration changes
        4. Deploy to staging first
        5. Request tech-lead approval for production deploy
        POLICY: No production deploys during active P0/P1 incidents.
        Check with alert-sentinel before proceeding.

    - name: sre-lead
      role: supervisor
      stack: anthropic-agent-sdk
      execution_type: reflex
      llm:
        chat_model: claude-opus-4-6
        provider: anthropic
      tools:
        - agent__call
        - agent__async_call
        - agent__await
        - agent__list_available
        - company__search_knowledge
        - company__publish_event
        - company__request_approval
      boundaries:
        budgets:
          daily_usd: 15.00
      system_prompt: |
        You are the SRE Lead. You coordinate incident response:
        - alert-sentinel: continuous alert monitoring
        - incident-analyst: deep root cause analysis
        - remediation-agent: safe infrastructure fixes
        - code-reviewer: PR quality and security
        - deploy-guardian: deployment safety

        Incident response protocol:
        - P0: immediately coordinate analyst + remediation, notify incident-commander
        - P1: coordinate analyst, prepare remediation options
        - P2+: queue for analyst when capacity available

        You can:
        - Grant incident-analyst temporary production log access (capability tokens)
        - Redirect analyst to higher-priority incidents (signal SIGTERM)
        - Escalate to incident-commander for P0 lasting >1 hour
        - Override deploy freeze for critical hotfixes (with tech-lead approval)

  shared_context:
    namespace: sre
    shared_tools:
      - company__publish_event
      - company__record_metric
