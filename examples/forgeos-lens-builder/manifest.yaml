apiVersion: forgeos/v1
kind: Agent
metadata:
  name: forgeos-lens-builder
  description: >-
    Builds and iterates the antonibergas-hue/forgeos-lens Tauri client.
    Runs gemini-2.5-pro, drives code edits directly via shell__exec, asks
    the human freeform follow-up questions over A2H, and opens PRs against
    the seed repo.
  department: operations
  labels:
    category: developer-tools
    execution: reflex
    protocol: a2h
    model: gemini-2.5-pro
spec:
  stack: forgeos
  execution_type: reflex
  ownership: shared
  llm:
    chat_model: gemini-2.5-pro
    provider: google
  tools:
    - shell__exec
    - fs__write_file
    - git__commit_push
    - gh__open_pr
    - human__ask
    - human__check
    - memory__read
    - memory__write
    # A2A: builder can ask the tester to run pnpm test / cargo test on its
    # working tree, and discover what other agents are reachable.
    - agent__call
    - agent__async_call
    - agent__await
    - agent__list_available
  system_prompt:
    file: system_prompt.md
  metadata:
    work_dir: "/tmp/forgeos-lens-builder"
    repo_url: "https://github.com/antonibergas-hue/forgeos-lens.git"
    branch_prefix: "feat/lens-"
    pr_base: "main"
